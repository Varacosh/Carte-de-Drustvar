<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte de Drustvar</title>
<style>
  /* ====== Carte interactive de Drustvar ====== */
  :root {
    --ink: #441D07;          /* couleur des marqueurs (brun sépia) */
    --popup-bg: #f3ecd8;     /* fond parchemin du pop-up */
    --popup-border: #441D07;
    --popup-text: #2a1c0c;
    /* curseur flèche personnalisé, réutilisable partout */
    --cursor-arrow: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0Ij4KPHBhdGggZD0iTTIsMiBMMiwxOCBMNi4yLDE0LjIgTDkuMiwyMSBMMTIsMTkuOCBMOSwxMy4yIEwxNC41LDEzIFoiCmZpbGw9IiM0NDFEMDciIHN0cm9rZT0iI2YzZWNkOCIgc3Ryb2tlLXdpZHRoPSIxLjMiIHN0cm9rZS1saW5lam9pbj0icm91bmQiLz4KPC9zdmc+") 2 2, default;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: #11161c;
    font-family: "Georgia", "Times New Roman", serif;
    cursor: var(--cursor-arrow);   /* curseur personnalisé par défaut partout */
  }

  /* La carte tient entièrement dans la fenêtre (vue d'ensemble au chargement) */
  #map-stage {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    position: relative;
    touch-action: none;       /* on gère nous-mêmes le tactile */
    cursor: var(--cursor-arrow);
    background: #11161c;
  }
  #map-stage.dragging { cursor: grabbing; }

  /* ---- Boutons de zoom discrets ---- */
  #zoom-controls {
    position: absolute;
    right: 14px;
    bottom: 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 50;
  }
  #zoom-controls button {
    width: 38px;
    height: 38px;
    border: 1.5px solid rgba(68, 29, 7, 0.55);
    border-radius: 7px;
    background: rgba(243, 236, 216, 0.82);
    color: #441D07;
    font-size: 20px;
    font-family: "Georgia", serif;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.25);
    transition: background 0.12s, transform 0.08s;
    backdrop-filter: blur(2px);
  }
  #zoom-controls button:hover { background: rgba(243, 236, 216, 1); }
  #zoom-controls button:active { transform: scale(0.92); }
  #zoom-reset { font-size: 17px; }

  #map-wrap {
    position: absolute;
    top: 0;
    left: 0;
    aspect-ratio: 2048 / 1536;
    transform-origin: 0 0;     /* le zoom se calcule depuis le coin haut-gauche */
    will-change: transform;
    --u: 1px;                  /* 1 unité = 1px de la carte affichée, recalculé en JS */
  }
  #map-img {
    display: block;
    width: 100%;
    height: 100%;
    user-select: none;
    -webkit-user-drag: none;
    pointer-events: none;      /* l'image ne capte pas le glisser */
  }
  #markers {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;      /* le glisser passe à travers les zones vides */
  }

  /* ---- Marqueurs ---- */
  .marker {
    position: absolute;
    transform: translate(-50%, -50%);
    cursor: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNiIgaGVpZ2h0PSIzMiIgdmlld0JveD0iMCAwIDI2IDMyIj4KPHBhdGggZD0iTTcuNCw2LjIKQzcuNCw0LjMgMTAuNCw0LjMgMTAuNCw2LjIKTDEwLjQsMTMuMgpMMTAuNCwxMS40IEMxMC40LDEwLjIgMTIuNywxMC4yIDEyLjcsMTEuNApMMTIuNywxMy4wCkwxMi43LDExLjggQzEyLjcsMTAuNyAxNS4wLDEwLjcgMTUuMCwxMS44CkwxNS4wLDEzLjQKTDE1LjAsMTIuNiBDMTUuMCwxMS41IDE3LjIsMTEuNSAxNy4yLDEyLjYKTDE3LjIsMTQuMgpDMTcuNiwxMy42IDE5LjQsMTMuOCAxOS40LDE1LjIKTDE5LjQsMjEuNQpDMTkuNCwyNi42IDE2LjIsMzAuMiAxMS42LDMwLjIKQzguNiwzMC4yIDYuNiwyOC44IDUuMCwyNi4wCkwyLjAsMjAuOApDMS4zLDE5LjYgMy4xLDE4LjIgNC4yLDE5LjQKTDYuNCwyMS42CkM2LjksMjIuMSA3LjQsMjEuOSA3LjQsMjEuMCBaIgpmaWxsPSIjNDQxRDA3IiBzdHJva2U9IiNmM2VjZDgiIHN0cm9rZS13aWR0aD0iMS4yIiBzdHJva2UtbGluZWpvaW49InJvdW5kIiBzdHJva2UtbGluZWNhcD0icm91bmQiLz4KPC9zdmc+") 9 6, pointer;
    z-index: 2;
    pointer-events: auto;      /* le marqueur reste cliquable */
    /* ombre douce pour poser le marqueur sur la carte */
    filter: drop-shadow(0 1px 1.5px rgba(40, 20, 5, 0.45));
    transition: transform 0.1s ease;
  }
  /* au survol : marqueur légèrement agrandi, sans contour ni couleur ajoutée */
  .marker:hover {
    transform: translate(-50%, -50%) scale(1.25);
    z-index: 5;
  }

  .shape-small {
    display: block;
    width: calc(11 * var(--u));
    height: calc(11 * var(--u));
    border-radius: 50%;
    background: var(--ink);
  }
  .shape-big {
    width: calc(26 * var(--u));
    height: calc(26 * var(--u));
    border-radius: 50%;
    border: calc(4 * var(--u)) solid var(--ink);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .shape-big::after {
    content: '';
    width: calc(8 * var(--u));
    height: calc(8 * var(--u));
    border-radius: 50%;
    background: var(--ink);
  }
  .shape-square {
    width: calc(26 * var(--u));
    height: calc(26 * var(--u));
    border: calc(4 * var(--u)) solid var(--ink);
    border-radius: calc(2 * var(--u)); /* coins très légèrement adoucis */
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .shape-square::after {
    content: '';
    width: calc(9 * var(--u));
    height: calc(9 * var(--u));
    background: var(--ink);
  }

  /* ---- Pop-up ---- */
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(20, 12, 4, 0.62);
    backdrop-filter: blur(2px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  #overlay.open { display: flex; animation: overlay-in 0.25s ease; }
  @keyframes overlay-in { from { opacity: 0; } to { opacity: 1; } }

  #popup {
    position: relative;
    background:
      radial-gradient(circle at 30% 18%, rgba(255, 250, 235, 0.6), rgba(255,250,235,0) 60%),
      linear-gradient(160deg, #f6efdc 0%, #efe6cd 55%, #e7dcc0 100%);
    color: var(--popup-text);
    border: 1px solid #8a6a3a;
    border-radius: 10px;
    max-width: 620px;
    width: calc(100% - 48px);
    max-height: 82vh;
    overflow-y: auto;
    padding: 30px 32px 32px;
    box-shadow: 0 18px 50px rgba(0, 0, 0, 0.55),
                inset 0 0 0 5px rgba(243, 236, 216, 0.9),
                inset 0 0 0 6px rgba(138, 106, 58, 0.55);
    animation: popup-in 0.32s cubic-bezier(0.2, 0.8, 0.3, 1);
  }
  @keyframes popup-in {
    from { opacity: 0; transform: translateY(14px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* barre de défilement discrète et assortie */
  #popup::-webkit-scrollbar { width: 10px; }
  #popup::-webkit-scrollbar-track { background: transparent; }
  #popup::-webkit-scrollbar-thumb {
    background: rgba(138, 106, 58, 0.45);
    border-radius: 6px;
    border: 3px solid transparent;
    background-clip: padding-box;
  }
  #popup::-webkit-scrollbar-thumb:hover { background: rgba(138, 106, 58, 0.7); background-clip: padding-box; }

  #popup h2 {
    margin: 0 0 6px;
    font-size: 25px;
    text-align: center;
    letter-spacing: 0.5px;
    color: #3a2208;
  }
  /* ornement sous le titre : filet + losange central */
  #popup .title-rule {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 0 0 16px;
    color: #9a7a4a;
  }
  #popup .title-rule::before,
  #popup .title-rule::after {
    content: '';
    height: 1px;
    width: 64px;
    background: linear-gradient(to right, rgba(138,106,58,0), rgba(138,106,58,0.7));
  }
  #popup .title-rule::after { background: linear-gradient(to left, rgba(138,106,58,0), rgba(138,106,58,0.7)); }
  #popup .title-rule span { font-size: 11px; }

  #popup .body {
    font-size: 16px;
    line-height: 1.68;
    text-align: justify;
    hyphens: auto;
  }
  /* lettrine discrète sur le premier paragraphe */
  #popup .body::first-letter {
    font-size: 2.6em;
    line-height: 0.8;
    float: left;
    margin: 4px 8px 0 0;
    color: #6a4a1a;
    font-weight: 600;
  }
  #popup .body:empty::before {
    content: "(Aucun texte pour ce lieu pour le moment.)";
    color: #8a7a5c;
    font-style: italic;
    float: none;
  }
  #popup .body:empty::first-letter { font-size: inherit; float: none; margin: 0; color: inherit; }

  #popup .close {
    position: absolute;
    top: 12px;
    right: 14px;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(138, 106, 58, 0.12);
    border: 1px solid rgba(138, 106, 58, 0.35);
    border-radius: 50%;
    font-size: 20px;
    line-height: 1;
    cursor: pointer;
    color: var(--popup-border);
    transition: background 0.12s, transform 0.12s;
    z-index: 2;
  }
  #popup .close:hover { background: rgba(138, 106, 58, 0.28); transform: rotate(90deg); }

  /* Image (blason) en haut du pop-up */
  #popup-image { text-align: center; }
  #popup-image:empty { display: none; }
  #popup-image img {
    max-width: 190px;
    max-height: 210px;
    width: auto;
    height: auto;
    margin: 2px auto 10px;
    cursor: zoom-in;
    transition: transform 0.15s;
    filter: drop-shadow(0 3px 7px rgba(40, 24, 8, 0.3));
  }
  #popup-image img:hover { transform: scale(1.05); }

  /* devise héraldique entre le blason et le texte */
  #popup-devise { text-align: center; }
  #popup-devise:empty { display: none; }
  #popup-devise .devise-inner {
    display: inline-block;
    font-style: italic;
    font-size: 16px;
    color: #5a3a1a;
    padding: 4px 22px 16px;
    position: relative;
  }
  #popup-devise .devise-inner::before,
  #popup-devise .devise-inner::after {
    content: "«";
    font-style: normal;
    color: #9a7a4a;
    font-size: 16px;
    margin: 0 6px;
    vertical-align: baseline;
  }
  #popup-devise .devise-inner::after { content: "»"; }

  /* Lightbox : image en grand */
  #lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    cursor: zoom-out;
  }
  #lightbox.open { display: flex; }
  #lightbox img {
    width: min(600px, 88vw);
    height: min(600px, 88vh);
    object-fit: contain;        /* l'image s'inscrit dans le cadre sans déformation */
  }
  #lightbox .close {
    position: absolute;
    top: 18px;
    right: 24px;
    background: none;
    border: none;
    font-size: 40px;
    line-height: 1;
    cursor: pointer;
    color: #f3ecd8;
    text-shadow: 0 1px 4px rgba(0,0,0,0.6);
  }
  #lightbox .close:hover { color: #fff; }
</style>
</head>
<body>

<div id="map-stage">
  <div id="map-wrap">
    <img id="map-img" src="Drustvarsanspoint.png" alt="Carte de Drustvar">
    <div id="markers"></div>
  </div>
  <div id="zoom-controls">
    <button id="zoom-in" title="Zoomer" aria-label="Zoomer">+</button>
    <button id="zoom-out" title="Dézoomer" aria-label="Dézoomer">&minus;</button>
    <button id="zoom-reset" title="Vue d'ensemble" aria-label="Vue d'ensemble">⤢</button>
  </div>
</div>

<!-- Pop-up -->
<div id="overlay">
  <div id="popup">
    <button class="close" aria-label="Fermer" onclick="closePopup()">&times;</button>
    <h2 id="popup-title"></h2>
    <div class="title-rule"><span>◆</span></div>
    <div id="popup-image"></div>
    <div id="popup-devise"></div>
    <div class="body" id="popup-body"></div>
  </div>
</div>

<!-- Image en grand (clic sur le blason) -->
<div id="lightbox">
  <button class="close" aria-label="Fermer" onclick="closeLightbox()">&times;</button>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
  /* ============================================================
     LIEUX DE LA CARTE
     Pour écrire un pop-up, remplis le champ "text" du lieu voulu.
     HTML simple autorisé : <b>gras</b>, <i>italique</i>, <br> saut de ligne.
     Pour afficher une image (ex: un blason) en haut du pop-up, ajoute un champ
       image: "NomDuFichier.png"   (le fichier doit être à côté de index.html)
     L'image est cliquable pour s'ouvrir en grand.
     Ne touche pas à x, y et type (position et forme du marqueur).
     ============================================================ */
  const LOCATIONS = [
    { id:  1, name: "Port-Banal", x: 19.873, y: 43.88, type: "small", text: "" },
    { id:  2, name: "Crêt-Rouge", x: 18.213, y: 60.124, type: "big", text: "" },
    { id:  3, name: "Butte-du-Faucon", x: 26.074, y: 71.257, type: "big", text: "" },
    { id:  4, name: "Noirétang", x: 32.324, y: 63.184, type: "big", text: "", image: "PénitentsDuFaucon.png" },
    { id:  5, name: "Froidecombe", x: 39.014, y: 33.333, type: "big", text: "" },
    { id:  6, name: "Ferté-d'Arom", x: 39.746, y: 48.255, type: "square", text: "", image: "Ferté-d'Arom.png" },
    { id:  7, name: "Front-de-Glace", x: 50.586, y: 41.172, type: "big", text: "", image: "Morneneige.png" },
    { id:  8, name: "Cornemont", x: 48.096, y: 27.773, type: "big", text: "", image: "Tromann.png" },
    { id:  9, name: "Hauts de Corlain", x: 33.496, y: 15.755, type: "square", text: "", image: "Malvoie.png" },
    { id: 10, name: "Corlain", x: 29.785, y: 25.482, type: "big", text: "" },
    { id: 11, name: "Tour Crefort", x: 37.5, y: 54.349, type: "small", image: "Crefort.png", devise: "Forgés par le feu, tempérés par l'honneur", text: `Érigée sur les hauteurs dominant la forêt Cramoisie, la tour Crefort surveillait autrefois les sentiers s'enfonçant sous le couvert des arbres. La maison Crefort, dont la tour porte le nom, y entretenait une garnison peu nombreuse mais d'une valeur reconnue : on prêtait à chacun de ses soldats la valeur de cinq hommes, tant ils excellaient à exploiter le terrain pour renverser le cours d'un affrontement.<br><br>La lignée déclina lors du soulèvement de la maison Bonval contre les Malvoie. Hattie Crefort, qui commandait alors les siens, embrassa la cause rebelle. Devant Froidecombe, tentant de contenir la coalition levée contre Bonval, elle tomba sous les coups de Heideck Tertrebois au terme d'un duel acharné. À la nouvelle de sa défaite, la garde restée à la tour renia son serment, pilla les biens confiés à sa protection et prit la route, où ces hommes sévissent désormais en détrousseurs.<br><br>Dame Lucille Malvoie gracia Cierra Crefort, dernière héritière du nom, jugeant qu'un enfant ne saurait répondre des fautes de ses parents. La jeune fille grandit au manoir Malvoie, où elle reçoit l'éducation due à son rang ; à sa majorité, la tour devrait lui revenir de droit. D'ici là, privée de maître et de garnison, elle se délabre lentement sous l'œuvre du temps.` },
    { id: 12, name: "Rucherain", x: 44.922, y: 55, type: "big", text: "", image: "Mellifor.png" },
    { id: 13, name: "Griseroche", x: 38.721, y: 62.292, type: "big", text: "", image: "Forpin.png" },
    { id: 14, name: "Tertrebois", x: 62.451, y: 53.411, type: "big", text: "", image: "Tertrebois.png" },
    { id: 15, name: "Cimetière de Tertrebois", x: 64.453, y: 47.617, type: "small", text: "" },
    { id: 16, name: "Ruisseval", x: 60.352, y: 38.307, type: "big", text: "" },
    { id: 17, name: "Havrebrune", x: 62.549, y: 33.477, type: "big", text: "", image: "Havrebrune.png" },
    { id: 18, name: "Port du Désosseur", x: 69.678, y: 28.789, type: "big", text: "" },
    { id: 19, name: "Manoir Valautomne", x: 60.498, y: 21.406, type: "small", text: "" },
    { id: 20, name: "Quai du Trident", x: 57.959, y: 7.487, type: "big", text: "", image: "Sombrabysse.png" },
    { id: 21, name: "Quai du Trident", x: 60.889, y: 3.32, type: "big", text: "", image: "Sombrabysse.png" },
    { id: 22, name: "Corvenac", x: 61.865, y: 78.177, type: "big", text: "", image: "Corven.png" },
    { id: 23, name: "Capembrun", x: 21.582, y: 25.911, type: "big", text: "", image: "Rougepince.png" },
    { id: 24, name: "Chapelle des Bois-Blancs", x: 23.291, y: 13.216, type: "small", text: "" },
    { id: 25, name: "Brisecôte", x: 19.336, y: 32.292, type: "big", text: "" },
    { id: 26, name: "Bruménac", x: 71.143, y: 72.493, type: "big", text: "" },
    { id: 27, name: "Val-Archer", x: 77.1, y: 63.118, type: "big", text: "", image: "Val-Archer.png" },
    { id: 28, name: "Pavillon des Éperlans", x: 77.393, y: 49.935, type: "small", text: "" },
    { id: 29, name: "Pointe du Gibet", x: 78.662, y: 39.193, type: "small", text: "" },
    { id: 30, name: "Tour de Guet", x: 83.378, y: 46.441, type: "small", text: "" },
    { id: 31, name: "Colline de la Vigie", x: 89.189, y: 51.552, type: "big", text: "" },
    { id: 32, name: "Harasac", x: 26.025, y: 43.555, type: "big", text: "" },
    { id: 33, name: "Mines des Collines Désolées", x: 35.986, y: 29.297, type: "small", text: "" },
    { id: 34, name: "Armurerie de Corlain", x: 23.486, y: 35.091, type: "small", text: "" },
    { id: 35, name: "Domaine Lovell", x: 76.758, y: 2.409, type: "big", text: "", image: "Lovell.png" },
    { id: 36, name: "Domaine Norwington", x: 82.06, y: 9.896, type: "small", text: "" },
    { id: 37, name: "Manoir Malvoie", x: 34.696, y: 9.049, type: "small", text: "" },
    { id: 38, name: "Quai d'Accastillage", x: 29.688, y: 11.784, type: "big", text: "" },
    { id: 39, name: "Porte de Daelin", x: 88.774, y: 62.527, type: "small", text: "" },
    { id: 40, name: "Guet de l'Ouest", x: 15.129, y: 6.836, type: "small", text: "" },
    { id: 41, name: "Courbécueil", x: 75.586, y: 86.849, type: "big", text: "", image: "Courbécueil.png" },
  ];

  /* ============================================================
     MOTEUR DE LA CARTE — pas besoin d'y toucher
     ============================================================ */
  const ORIG_W = 2048, ORIG_H = 1536;   // dimensions natives de la carte
  const stage = document.getElementById('map-stage');
  const wrap = document.getElementById('map-wrap');
  const img = document.getElementById('map-img');
  const markersLayer = document.getElementById('markers');

  function shapeHTML(type) {
    if (type === 'small')  return '<span class="shape-small"></span>';
    if (type === 'big')    return '<span class="shape-big"></span>';
    if (type === 'square') return '<span class="shape-square"></span>';
    return '<span class="shape-small"></span>';
  }

  function buildMarkers() {
    markersLayer.innerHTML = '';
    LOCATIONS.forEach(loc => {
      const m = document.createElement('div');
      m.className = 'marker';
      m.style.left = loc.x + '%';
      m.style.top = loc.y + '%';
      m.innerHTML = shapeHTML(loc.type);
      m.addEventListener('click', (e) => { e.stopPropagation(); openPopup(loc); });
      markersLayer.appendChild(m);
    });
  }

  /* ---- Zoom & déplacement ---- */
  let baseW = 0, baseH = 0;   // taille de la carte à l'échelle 1 (ajustée à l'écran)
  let scale = 1;              // facteur de zoom courant
  let tx = 0, ty = 0;         // décalage (translation) courant
  let minScale = 1;
  const MAX_SCALE = 6;

  // calcule la taille de base : la carte entière tient dans la fenêtre
  function computeBase() {
    const vw = stage.clientWidth, vh = stage.clientHeight;
    const fit = Math.min(vw / ORIG_W, vh / ORIG_H);
    baseW = ORIG_W * fit;
    baseH = ORIG_H * fit;
    wrap.style.width = baseW + 'px';
    wrap.style.height = baseH + 'px';
    // l'unité des marqueurs suit la taille de base (le zoom est géré par transform)
    wrap.style.setProperty('--u', (baseW / ORIG_W) + 'px');
  }

  function clamp() {
    const vw = stage.clientWidth, vh = stage.clientHeight;
    const w = baseW * scale, h = baseH * scale;
    // si la carte est plus petite que la fenêtre sur un axe, on la centre
    if (w <= vw) { tx = (vw - w) / 2; }
    else { tx = Math.min(0, Math.max(vw - w, tx)); }
    if (h <= vh) { ty = (vh - h) / 2; }
    else { ty = Math.min(0, Math.max(vh - h, ty)); }
  }

  function apply() {
    clamp();
    wrap.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
  }

  function resetView() {
    computeBase();
    scale = 1; minScale = 1;
    tx = 0; ty = 0;
    apply();
  }

  // zoom à la molette UNIQUEMENT avec Ctrl (évite le zoom accidentel)
  stage.addEventListener('wheel', (e) => {
    if (!e.ctrlKey) return;          // molette seule : on ne fait rien
    e.preventDefault();
    const rect = stage.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;
    const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
    zoomAt(cx, cy, factor);
  }, { passive: false });

  // zoom centré sur un point de l'écran (cx, cy) par un facteur
  function zoomAt(cx, cy, factor) {
    const newScale = Math.min(MAX_SCALE, Math.max(minScale, scale * factor));
    if (newScale === scale) return;
    const k = newScale / scale;
    tx = cx - k * (cx - tx);
    ty = cy - k * (cy - ty);
    scale = newScale;
    apply();
  }

  // boutons +/- : zoom centré sur le milieu de la carte visible
  function zoomButton(dir) {
    const factor = dir > 0 ? 1.3 : 1 / 1.3;
    zoomAt(stage.clientWidth / 2, stage.clientHeight / 2, factor);
  }

  // déplacement à la souris
  let dragging = false, moved = false, sx = 0, sy = 0;
  stage.addEventListener('mousedown', (e) => {
    if (e.target.closest('#zoom-controls')) return;  // pas de glisser sur les boutons
    dragging = true; moved = false;
    sx = e.clientX - tx; sy = e.clientY - ty;
    stage.classList.add('dragging');
  });
  window.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    tx = e.clientX - sx; ty = e.clientY - sy;
    moved = true;
    apply();
  });
  window.addEventListener('mouseup', () => {
    dragging = false;
    stage.classList.remove('dragging');
  });

  // double-clic : réinitialise la vue d'ensemble
  stage.addEventListener('dblclick', (e) => {
    if (e.target.closest('#zoom-controls')) return;
    resetView();
  });

  /* ---- Tactile : pincer pour zoomer, glisser pour déplacer ---- */
  let touchMode = null, lastDist = 0, lastMid = null;
  stage.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      touchMode = 'pan';
      sx = e.touches[0].clientX - tx; sy = e.touches[0].clientY - ty;
    } else if (e.touches.length === 2) {
      touchMode = 'pinch';
      lastDist = touchDist(e); lastMid = touchMid(e);
    }
  }, { passive: false });
  stage.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (touchMode === 'pan' && e.touches.length === 1) {
      tx = e.touches[0].clientX - sx; ty = e.touches[0].clientY - sy;
      apply();
    } else if (touchMode === 'pinch' && e.touches.length === 2) {
      const dist = touchDist(e), mid = touchMid(e);
      const rect = stage.getBoundingClientRect();
      const cx = mid.x - rect.left, cy = mid.y - rect.top;
      const newScale = Math.min(MAX_SCALE, Math.max(minScale, scale * (dist / lastDist)));
      const k = newScale / scale;
      tx = cx - k * (cx - tx);
      ty = cy - k * (cy - ty);
      scale = newScale;
      lastDist = dist;
      apply();
    }
  }, { passive: false });
  stage.addEventListener('touchend', (e) => {
    if (e.touches.length === 0) touchMode = null;
    else if (e.touches.length === 1) { touchMode = 'pan'; sx = e.touches[0].clientX - tx; sy = e.touches[0].clientY - ty; }
  });
  function touchDist(e) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    return Math.hypot(dx, dy);
  }
  function touchMid(e) {
    return { x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
             y: (e.touches[0].clientY + e.touches[1].clientY) / 2 };
  }

  /* ---- Pop-up ---- */
  const overlay = document.getElementById('overlay');
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');

  function openPopup(loc) {
    if (moved) return; // ne pas ouvrir si on vient de glisser
    document.getElementById('popup-title').textContent = loc.name || ('Lieu n°' + loc.id);
    // image (blason) éventuelle
    const imgBox = document.getElementById('popup-image');
    if (loc.image) {
      imgBox.innerHTML = '';
      const im = document.createElement('img');
      im.src = loc.image;
      im.alt = loc.name || '';
      im.title = "Cliquer pour agrandir";
      im.addEventListener('click', () => openLightbox(loc.image, loc.name));
      imgBox.appendChild(im);
    } else {
      imgBox.innerHTML = '';
    }
    // devise éventuelle (entre le blason et le texte)
    const deviseBox = document.getElementById('popup-devise');
    deviseBox.innerHTML = loc.devise ? '<span class="devise-inner">' + loc.devise + '</span>' : '';
    document.getElementById('popup-body').innerHTML = loc.text || '';
    overlay.classList.add('open');
  }
  function closePopup() {
    overlay.classList.remove('open');
  }
  function openLightbox(src, alt) {
    lightboxImg.src = src;
    lightboxImg.alt = alt || '';
    lightbox.classList.add('open');
  }
  function closeLightbox() {
    lightbox.classList.remove('open');
    lightboxImg.src = '';
  }
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closePopup(); });
  lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Escape') return;
    if (lightbox.classList.contains('open')) closeLightbox();  // l'image se ferme en premier
    else closePopup();
  });

  /* ---- Init ---- */
  document.getElementById('zoom-in').addEventListener('click', () => zoomButton(1));
  document.getElementById('zoom-out').addEventListener('click', () => zoomButton(-1));
  document.getElementById('zoom-reset').addEventListener('click', resetView);
  window.addEventListener('resize', resetView);
  buildMarkers();
  if (img.complete) resetView(); else img.addEventListener('load', resetView);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte de Drustvar</title>
<style>
  /* ====== Carte interactive de Drustvar ====== */
  :root {
    --ink: #441D07;          /* couleur des marqueurs (brun sépia) */
    --popup-bg: #f3ecd8;     /* fond parchemin du pop-up */
    --popup-border: #441D07;
    --popup-text: #2a1c0c;
    /* curseur flèche personnalisé, réutilisable partout */
    --cursor-arrow: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0Ij4KPHBhdGggZD0iTTIsMiBMMiwxOCBMNi4yLDE0LjIgTDkuMiwyMSBMMTIsMTkuOCBMOSwxMy4yIEwxNC41LDEzIFoiCmZpbGw9IiM0NDFEMDciIHN0cm9rZT0iI2YzZWNkOCIgc3Ryb2tlLXdpZHRoPSIxLjMiIHN0cm9rZS1saW5lam9pbj0icm91bmQiLz4KPC9zdmc+") 2 2, default;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: #11161c;
    font-family: "Georgia", "Times New Roman", serif;
    cursor: var(--cursor-arrow);   /* curseur personnalisé par défaut partout */
  }

  /* La carte tient entièrement dans la fenêtre (vue d'ensemble au chargement) */
  #map-stage {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    position: relative;
    touch-action: none;       /* on gère nous-mêmes le tactile */
    cursor: var(--cursor-arrow);
    background: #11161c;
  }
  #map-stage.dragging { cursor: grabbing; }

  /* ---- Boutons de zoom discrets ---- */
  #zoom-controls {
    position: absolute;
    right: 14px;
    bottom: 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 50;
  }
  #zoom-controls button {
    width: 38px;
    height: 38px;
    border: 1.5px solid rgba(68, 29, 7, 0.55);
    border-radius: 7px;
    background: rgba(243, 236, 216, 0.82);
    color: #441D07;
    font-size: 20px;
    font-family: "Georgia", serif;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.25);
    transition: background 0.12s, transform 0.08s;
    backdrop-filter: blur(2px);
  }
  #zoom-controls button:hover { background: rgba(243, 236, 216, 1); }
  #zoom-controls button:active { transform: scale(0.92); }
  #zoom-reset { font-size: 17px; }

  #map-wrap {
    position: absolute;
    top: 0;
    left: 0;
    aspect-ratio: 2048 / 1536;
    transform-origin: 0 0;     /* le zoom se calcule depuis le coin haut-gauche */
    will-change: transform;
    --u: 1px;                  /* 1 unité = 1px de la carte affichée, recalculé en JS */
  }
  #map-img {
    display: block;
    width: 100%;
    height: 100%;
    user-select: none;
    -webkit-user-drag: none;
    pointer-events: none;      /* l'image ne capte pas le glisser */
  }
  #markers {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;      /* le glisser passe à travers les zones vides */
  }

  /* ---- Marqueurs ---- */
  .marker {
    position: absolute;
    transform: translate(-50%, -50%);
    cursor: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNiIgaGVpZ2h0PSIzMiIgdmlld0JveD0iMCAwIDI2IDMyIj4KPHBhdGggZD0iTTcuNCw2LjIKQzcuNCw0LjMgMTAuNCw0LjMgMTAuNCw2LjIKTDEwLjQsMTMuMgpMMTAuNCwxMS40IEMxMC40LDEwLjIgMTIuNywxMC4yIDEyLjcsMTEuNApMMTIuNywxMy4wCkwxMi43LDExLjggQzEyLjcsMTAuNyAxNS4wLDEwLjcgMTUuMCwxMS44CkwxNS4wLDEzLjQKTDE1LjAsMTIuNiBDMTUuMCwxMS41IDE3LjIsMTEuNSAxNy4yLDEyLjYKTDE3LjIsMTQuMgpDMTcuNiwxMy42IDE5LjQsMTMuOCAxOS40LDE1LjIKTDE5LjQsMjEuNQpDMTkuNCwyNi42IDE2LjIsMzAuMiAxMS42LDMwLjIKQzguNiwzMC4yIDYuNiwyOC44IDUuMCwyNi4wCkwyLjAsMjAuOApDMS4zLDE5LjYgMy4xLDE4LjIgNC4yLDE5LjQKTDYuNCwyMS42CkM2LjksMjIuMSA3LjQsMjEuOSA3LjQsMjEuMCBaIgpmaWxsPSIjNDQxRDA3IiBzdHJva2U9IiNmM2VjZDgiIHN0cm9rZS13aWR0aD0iMS4yIiBzdHJva2UtbGluZWpvaW49InJvdW5kIiBzdHJva2UtbGluZWNhcD0icm91bmQiLz4KPC9zdmc+") 9 6, pointer;
    z-index: 2;
    pointer-events: auto;      /* le marqueur reste cliquable */
    /* ombre douce pour poser le marqueur sur la carte */
    filter: drop-shadow(0 1px 1.5px rgba(40, 20, 5, 0.45));
    transition: transform 0.1s ease;
  }
  /* au survol : marqueur légèrement agrandi, sans contour ni couleur ajoutée */
  .marker:hover {
    transform: translate(-50%, -50%) scale(1.25);
    z-index: 5;
  }

  .shape-small {
    display: block;
    width: calc(11 * var(--u));
    height: calc(11 * var(--u));
    border-radius: 50%;
    background: var(--ink);
  }
  .shape-big {
    width: calc(26 * var(--u));
    height: calc(26 * var(--u));
    border-radius: 50%;
    border: calc(4 * var(--u)) solid var(--ink);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .shape-big::after {
    content: '';
    width: calc(8 * var(--u));
    height: calc(8 * var(--u));
    border-radius: 50%;
    background: var(--ink);
  }
  .shape-square {
    width: calc(26 * var(--u));
    height: calc(26 * var(--u));
    border: calc(4 * var(--u)) solid var(--ink);
    border-radius: calc(2 * var(--u)); /* coins très légèrement adoucis */
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .shape-square::after {
    content: '';
    width: calc(9 * var(--u));
    height: calc(9 * var(--u));
    background: var(--ink);
  }

  /* ---- Pop-up ---- */
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(20, 12, 4, 0.62);
    backdrop-filter: blur(2px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  #overlay.open { display: flex; animation: overlay-in 0.25s ease; }
  @keyframes overlay-in { from { opacity: 0; } to { opacity: 1; } }

  #popup {
    position: relative;
    background:
      radial-gradient(circle at 30% 18%, rgba(255, 250, 235, 0.6), rgba(255,250,235,0) 60%),
      linear-gradient(160deg, #f6efdc 0%, #efe6cd 55%, #e7dcc0 100%);
    color: var(--popup-text);
    border: 1px solid #8a6a3a;
    border-radius: 10px;
    max-width: 620px;
    width: calc(100% - 48px);
    max-height: 82vh;
    overflow-y: auto;
    padding: 30px 32px 32px;
    box-shadow: 0 18px 50px rgba(0, 0, 0, 0.55),
                inset 0 0 0 5px rgba(243, 236, 216, 0.9),
                inset 0 0 0 6px rgba(138, 106, 58, 0.55);
    animation: popup-in 0.32s cubic-bezier(0.2, 0.8, 0.3, 1);
  }
  @keyframes popup-in {
    from { opacity: 0; transform: translateY(14px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* barre de défilement discrète et assortie */
  #popup::-webkit-scrollbar { width: 10px; }
  #popup::-webkit-scrollbar-track { background: transparent; }
  #popup::-webkit-scrollbar-thumb {
    background: rgba(138, 106, 58, 0.45);
    border-radius: 6px;
    border: 3px solid transparent;
    background-clip: padding-box;
  }
  #popup::-webkit-scrollbar-thumb:hover { background: rgba(138, 106, 58, 0.7); background-clip: padding-box; }

  #popup h2 {
    margin: 0 0 6px;
    font-size: 25px;
    text-align: center;
    letter-spacing: 0.5px;
    color: #3a2208;
  }
  /* ornement sous le titre : filet + losange central */
  #popup .title-rule {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 0 0 16px;
    color: #9a7a4a;
  }
  #popup .title-rule::before,
  #popup .title-rule::after {
    content: '';
    height: 1px;
    width: 64px;
    background: linear-gradient(to right, rgba(138,106,58,0), rgba(138,106,58,0.7));
  }
  #popup .title-rule::after { background: linear-gradient(to left, rgba(138,106,58,0), rgba(138,106,58,0.7)); }
  #popup .title-rule span { font-size: 11px; }

  #popup .body {
    font-size: 16px;
    line-height: 1.68;
    text-align: justify;
    hyphens: auto;
  }
  /* mots-clés mis en valeur (maisons, personnages, lieux) */
  #popup .body b, #popup .body strong {
    font-weight: 600;
    color: #6a3d12;
  }
  /* mots dotés d'une infobulle */
  #popup .body .glose {
    cursor: help;
    border-bottom: 1px dotted rgba(106, 61, 18, 0.6);
  }
  /* infobulle flottante */
  #tooltip {
    position: fixed;
    z-index: 300;
    max-width: 280px;
    background: linear-gradient(160deg, #f6efdc 0%, #ece1c6 100%);
    color: #3a2810;
    border: 1px solid #8a6a3a;
    border-radius: 8px;
    padding: 11px 14px;
    font-size: 14px;
    line-height: 1.5;
    font-style: normal;
    text-align: left;
    box-shadow: 0 6px 22px rgba(0, 0, 0, 0.35),
                inset 0 0 0 3px rgba(243, 236, 216, 0.85);
    pointer-events: none;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.14s ease, transform 0.14s ease;
  }
  #tooltip.show { opacity: 1; transform: translateY(0); }
  /* petite flèche sous la bulle */
  #tooltip::after {
    content: '';
    position: absolute;
    left: var(--arrow-x, 50%);
    bottom: -7px;
    transform: translateX(-50%);
    border-left: 7px solid transparent;
    border-right: 7px solid transparent;
    border-top: 7px solid #8a6a3a;
  }
  #tooltip.below::after {
    bottom: auto;
    top: -7px;
    border-top: none;
    border-bottom: 7px solid #8a6a3a;
  }
  /* lettrine discrète sur le premier paragraphe */
  #popup .body::first-letter {
    font-size: 2.6em;
    line-height: 0.8;
    float: left;
    margin: 4px 8px 0 0;
    color: #6a4a1a;
    font-weight: 600;
  }
  #popup .body:empty::before {
    content: "(Aucun texte pour ce lieu pour le moment.)";
    color: #8a7a5c;
    font-style: italic;
    float: none;
  }
  #popup .body:empty::first-letter { font-size: inherit; float: none; margin: 0; color: inherit; }

  #popup .close {
    position: absolute;
    top: 12px;
    right: 14px;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(138, 106, 58, 0.12);
    border: 1px solid rgba(138, 106, 58, 0.35);
    border-radius: 50%;
    font-size: 20px;
    line-height: 1;
    cursor: pointer;
    color: var(--popup-border);
    transition: background 0.12s, transform 0.12s;
    z-index: 2;
  }
  #popup .close:hover { background: rgba(138, 106, 58, 0.28); transform: rotate(90deg); }

  /* Image(s) (blason) en haut du pop-up */
  #popup-image {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 18px;
  }
  #popup-image:empty { display: none; }
  #popup-image img {
    max-width: 190px;
    max-height: 210px;
    width: auto;
    height: auto;
    margin: 2px 0 10px;
    cursor: zoom-in;
    transition: transform 0.15s;
    filter: drop-shadow(0 3px 7px rgba(40, 24, 8, 0.3));
  }
  /* quand il y a deux blasons ou plus : hauteur fixe identique pour tous */
  #popup-image img:not(:only-child) {
    height: 165px;
    width: auto;
    max-width: none;
    max-height: none;
  }
  #popup-image img:hover { transform: scale(1.05); }

  /* devise héraldique entre le blason et le texte */
  #popup-devise { text-align: center; }
  #popup-devise:empty { display: none; }
  #popup-devise .devise-inner {
    display: inline-block;
    font-style: italic;
    font-size: 16px;
    color: #5a3a1a;
    padding: 4px 22px 16px;
    position: relative;
  }
  #popup-devise .devise-inner::before,
  #popup-devise .devise-inner::after {
    content: "«";
    font-style: normal;
    color: #9a7a4a;
    font-size: 16px;
    margin: 0 6px;
    vertical-align: baseline;
  }
  #popup-devise .devise-inner::after { content: "»"; }

  /* Lightbox : image en grand */
  #lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    cursor: zoom-out;
  }
  #lightbox.open { display: flex; }
  #lightbox img {
    width: min(600px, 88vw);
    height: min(600px, 88vh);
    object-fit: contain;        /* l'image s'inscrit dans le cadre sans déformation */
  }
  #lightbox .close {
    position: absolute;
    top: 18px;
    right: 24px;
    background: none;
    border: none;
    font-size: 40px;
    line-height: 1;
    cursor: pointer;
    color: #f3ecd8;
    text-shadow: 0 1px 4px rgba(0,0,0,0.6);
  }
  #lightbox .close:hover { color: #fff; }
</style>
</head>
<body>

<div id="map-stage">
  <div id="map-wrap">
    <img id="map-img" src="Drustvarsanspoint.png" alt="Carte de Drustvar">
    <div id="markers"></div>
  </div>
  <div id="zoom-controls">
    <button id="zoom-in" title="Zoomer" aria-label="Zoomer">+</button>
    <button id="zoom-out" title="Dézoomer" aria-label="Dézoomer">&minus;</button>
    <button id="zoom-reset" title="Vue d'ensemble" aria-label="Vue d'ensemble">⤢</button>
  </div>
</div>

<!-- Pop-up -->
<div id="overlay">
  <div id="popup">
    <button class="close" aria-label="Fermer" onclick="closePopup()">&times;</button>
    <h2 id="popup-title"></h2>
    <div class="title-rule"><span>◆</span></div>
    <div id="popup-image"></div>
    <div id="popup-devise"></div>
    <div class="body" id="popup-body"></div>
  </div>
</div>

<!-- Image en grand (clic sur le blason) -->
<div id="lightbox">
  <button class="close" aria-label="Fermer" onclick="closeLightbox()">&times;</button>
  <img id="lightbox-img" src="" alt="">
</div>

<!-- Infobulle au survol des mots -->
<div id="tooltip"></div>

<script>
  /* ============================================================
     LIEUX DE LA CARTE
     Pour écrire un pop-up, remplis le champ "text" du lieu voulu.
     HTML simple autorisé : <b>gras</b>, <i>italique</i>, <br> saut de ligne.
     Pour afficher une image (ex: un blason) en haut du pop-up, ajoute un champ
       image: "NomDuFichier.png"   (le fichier doit être à côté de index.html)
     L'image est cliquable pour s'ouvrir en grand.
     Ne touche pas à x, y et type (position et forme du marqueur).
     ============================================================ */
  const LOCATIONS = [
    { id:  1, name: "Port-Banal", x: 19.873, y: 43.88, type: "small", text: "", image: "Portbanal.png" },
    { id:  2, name: "Crêt-Rouge", x: 18.213, y: 60.124, type: "big", text: "", image: "Cretrouge.png" },
    { id:  3, name: "Butte-du-Faucon", x: 26.074, y: 71.257, type: "big", text: "", image: "Buttedufaucon.png" },
    { id:  4, name: "Noirétang", x: 32.324, y: 63.184, type: "big", text: "", image: "PénitentsDuFaucon.png" },
    { id:  5, name: "Froidecombe", x: 39.014, y: 33.333, type: "big", text: `Cramponnée aux versants des montagnes qui fendent Drustvar d'orient en occident, Froidecombe domine une gorge noyée de brumes. Sa forteresse, nichée dans un repli du relief, ne concède que deux voies abruptes à quiconque souhaite l'atteindre. Longtemps administrée par la maison Bonval, la bourgade doit sa prospérité aux opulents filons de foudrargent tapis sous la roche, dont l'extraction approvisionne forges et manufactures.<br><br>Cette prospérité vacilla toutefois lorsque le seigneur Marc Bonval s'engagea dans une insurrection contre la maison Malvoie : Froidecombe se mua alors en ultime rempart de sa cause. Ralliés à l'entreprise sécessionniste, les Crefort périrent à la Passe Ouest, dégageant du même coup le passage à la coalition des partisans de Dame Malvoie. Dès lors, les alentours servirent de théâtre à de multiples manœuvres, résonnant du fracas des canons, des escarmouches et des embuscades, sur fond de préparatifs d'un siège que le froid ne tarda pas à changer en fléau meurtrier.<br><br>Les luttes menées pour s'emparer de la place forte prélevèrent ainsi un lourd tribut parmi les drustvaris. La maison Bonval elle-même succomba, non sans précipiter dans sa ruine la fin du seigneur Lesfred et celle de sa dame Adèle Tertrebois, que la postérité désigne sous le nom des « époux maudits de Froidecombe ».<br><br>Aujourd'hui, cependant, les cheminées exhalent de nouveau leurs fumées et les bannières Malvoie ondoient au vent, emblèmes d'une administration renouvelée. Gravement endommagée, la cité fut relevée de ses ruines, tandis que le manoir de la famille déchue passait aux mains de la maison Rougepince. Froidecombe n'en conserve pas moins, malgré elle, les stigmates du siège autant que la mémoire de la guerre parmi ses habitants endeuillés, naguère sujets des Bonval.`, image: "Froidecombe.png" },
    { id:  6, name: "Ferté-d'Arom", x: 39.746, y: 48.255, type: "square", text: "", image: "Ferté-d'Arom.png" },
    { id:  7, name: "Front-de-Glace", x: 50.586, y: 41.172, type: "big", text: "", image: "Morneneige.png" },
    { id:  8, name: "Cornemont", x: 48.096, y: 27.773, type: "big", text: "", image: "Tromann.png" },
    { id:  9, name: "Hauts de Corlain", x: 33.496, y: 15.755, type: "square", text: "", image: "Malvoie.png" },
    { id: 10, name: "Corlain", x: 29.785, y: 25.482, type: "big", text: "", image: "Malvoie.png" },
    { id: 11, name: "Tour Crefort", x: 37.5, y: 54.349, type: "small", image: "Crefort.png", devise: "Forgés par le feu, tempérés par l'honneur", text: `Dressée sur les crêtes surplombant la forêt Cramoisie, la tour Crefort veillait jadis sur les sentiers plongeant sous la ramure. La maison Crefort, qui légua son nom à l'édifice, y maintenait une garnison réduite, mais d'un mérite unanimement salué : la rumeur créditait chacun de ses soldats de la force de cinq hommes, tant ils déployaient de génie à tirer parti du terrain pour infléchir l'issue d'une bataille.<br><br>Cette lignée valeureuse sombra pourtant lors du soulèvement fomenté par la maison Bonval contre les Malvoie. Hattie Crefort, qui gouvernait alors les siens, se rangea sous la bannière rebelle. C'est ainsi que, devant les murs de Froidecombe, s'efforçant d'endiguer la coalition dressée contre Bonval, elle succomba aux coups de Heideck Tertrebois au terme d'un duel farouche. À l'annonce de ce revers, la garde demeurée à la tour abjura son serment : après avoir pillé les biens confiés à sa vigilance, elle gagna les chemins, où ces hommes écument désormais les routes en brigands.<br><br>Le nom des Crefort n'en fut pas pour autant effacé. Dame Lucille Malvoie accorda en effet sa clémence à Cierra Crefort, son ultime dépositaire, estimant qu'un enfant ne saurait répondre des égarements de ses géniteurs. Depuis lors, la jeune fille grandit au manoir Malvoie, où elle reçoit l'instruction que réclame son rang ; à sa majorité, la tour devrait lui échoir de plein droit. Jusque-là, cependant, dépourvue de maître comme de garnison, elle se délite peu à peu sous la morsure du temps.` },
    { id: 12, name: "Rucherain", x: 44.922, y: 55, type: "big", text: "", image: "Mellifor.png" },
    { id: 13, name: "Griseroche", x: 38.721, y: 62.292, type: "big", devise: "Le corps et le cœur à l'unisson", text: `Sur d'antiques fondations drust, arrachées par la milice drustvari, s'élèvent les pierres de Griseroche. Ce fief, que les Forpin se lèguent de génération en génération, domine un enchevêtrement de pics escarpés au sud de la Ferté-d'Arom, à l'endroit où le vent marin se mêle à l'ombre du mont Cortis ; ainsi placé, l'édifice surplombe la forêt Cramoisie et en garde l'un des accès.<br><br>La chute de Gorak Tul ne balaya pas les drust pour autant. Leurs ultimes survivants firent durer leur agonie au creux de derniers retranchements, jusqu'à ce que les Forpin participassent à les éteindre tout à fait. Une fois ce devoir accompli, la citadelle se dépouilla de sa vocation guerrière pour devenir un bourg prospère, où prirent racine bergers, trappeurs et artisans.<br><br>Affranchis de la surveillance de cette frontière, les Forpin se consacrèrent dès lors à l'abondance de leurs montagnes. Ils arrachèrent à la roche le foudrargent qui cimente encore leur économie et apprivoisèrent des griffons pour pourvoir la maison Malvoie en montures célestes.<br><br>L'avènement de la Horde, puis du Sabbat malecarde, vinrent néanmoins ternir cette puissance, les guerres successives saignant Kul Tiras sans épargner Griseroche. Depuis le déclin de sa population, la cité se referme sur elle-même et son affaiblissement laisse à l'abandon les routes et les cols qui la relient au reste du pays.`, image: "Forpin.png" },
    { id: 14, name: "Tertrebois", x: 62.451, y: 53.411, type: "big", devise: "Robuste est notre écorce, profondes sont nos racines.", text: `Niché entre le terrain de chasse de Ruisseval, Chasseru, et le cimetière éponyme, le domaine Tertrebois forme un bourg cerné d'une palissade de bois au pied des montagnes, en plein cœur d'une forêt ancienne où abondent une faune et une flore variées. À deux reprises, cependant, ces terres furent souillées par la mort : d'abord lors des exactions du Sabbat malecarde, puis lorsque le Fléau déchaîné en ébranla les fondations, entraînant tour à tour pertes, reprises et développements des lieux.<br><br>Longtemps repliée sur elle-même, l'histoire de la maison Tertrebois, intrinsèquement liée à ce territoire, profita néanmoins de la destruction de Havrebrune, plus au nord, qui fit du domaine un point de passage autant que d'intérêt pour les voyageurs sillonnant l'est drustvarti. Ses habitants tirent dès lors leur subsistance de la chasse, de la cueillette, du commerce de fourrures et de plantes, du travail du cuir ou encore de l'alchimie : autant d'activités tributaires de l'écosystème avec lequel ils doivent composer pour assurer leur pérennité.<br><br>Au sommet d'une butte qui surplombe les cimes des arbres centenaires se dresse la grande tour, qui fait office de demeure familiale. Ayant jadis appartenu à la maison Ruisseval, aujourd'hui éteinte, le bâtiment protège en son sein le seigneur Tobias Tertrebois. Ce dernier étant encore trop jeune pour officier, sa charge fut d'abord déléguée à son oncle Heideck, puis à sa tante Elima, qui en assure désormais la régence.`, image: "Tertrebois.png" },

    { id: 20, name: "Quai du Trident", x: 57.959, y: 7.487, type: "big", devise: "Inflexible sur terre, intrépide en mer", text: `Au point exact où la Grande mer se fraie un passage entre les ombreuses forêts de Drustvar et la rade de Tiragarde se dresse le Quai du Trident, village singulier dont les édifices se déploient tout à la fois sur l'une et l'autre berge. Aussi nul seigneur ne saurait-il prétendre à sa pleine possession : sise à mi-chemin entre deux contrées, au cœur même de cette brèche maritime, la localité ne relève que de l'autorité conciliatrice de la maison Chantorage, qui préside aux affaires des flots au nom du culte voué à la Mère des Marées.<br><br>Toutefois, bien au-delà des seuls avantages que lui confère son assise géographique, le Quai du Trident doit sa longue prospérité à la munificence de ses eaux. Depuis des temps immémoriaux, en effet, l'abondance des ressources marines alimente la fortune du lieu, au rythme incessant des chalutiers, pêcheurs et pourfendeurs de monstres marins qui, revenus du large, déchargent leurs prises vers les ateliers de la berge méridionale. Sur la rive opposée, à l'inverse, se déploient marchés et échoppes, où s'amoncellent denrées locales et marchandises venues d'horizons lointains ; là se presse une foule laborieuse et bigarrée, mêlant matelots, ouvriers, ravaudeurs, négociants, aventuriers et eaugures.<br><br>Une telle quiétude, cependant, ne pouvait demeurer sans épreuve, car le Quai du Trident eut à affronter des menaces d'une nature sans cesse renouvelée. Aux heures ténébreuses qui devancèrent la Quatrième Guerre, la maison Chantorage céda d'abord aux insinuations de la reine Azshara comme à l'emprise de N'Zoth, entreprenant de transmuer le paisible comptoir en avant-poste de leur domination abyssale, dessein qui, néanmoins, échoua. Aux manœuvres du Vide succédèrent bientôt les assauts de la Horde, lesquels révélèrent toute l'importance du rôle défensif de la Compagnie des Barges. Puis, les grands périls une fois dissipés, vinrent des fléaux plus sournois : car cette terre de promesses n'échappe ni au trafic de fausse monnaie ni au pillage des cargaisons. Contre ces désordres s'emploie la maison Sombrabysse qui, forte d'une résidence, d'entrepôts, de plusieurs navires et d'une salle des portails, concourt tout ensemble au renom et à la prospérité de ces parages. Aussi, depuis que le seigneur Brannon Chantorage a succédé à son oncle, cette maison administre officiellement les quais, avec son plein assentiment, s'efforçant ainsi d'endiguer de tels méfaits.`, images: ["Sombrabysse.png", "Chantorage.png"] },

    { id: 29, name: "Pointe du Gibet", x: 78.662, y: 39.193, type: "small", text: `À l'extrémité orientale du Drustvar, là où la terre s'effiloche vers la Rade de Tiragarde, se dresse un promontoire que nul n'ose nommer sans baisser la voix. Un arbre tordu y règne, seul, façonné par les vents comme par l'usage qu'on en a fait, puisque c'est de ses branches que la justice rend depuis longtemps son verdict le plus définitif. De là vient le nom qu'on lui donne, celui de Pointe du Gibet. Presque en permanence, les brouillards des rivages voisins le drapent, effaçant les contours et avalant les sons, tandis qu'au-dessus les corbeaux tracent des cercles patients. Un seul pont-levis, du reste, relie ce bout de monde aux terres de la Rade.<br><br>Superstitieux comme ils le sont, la plupart des Kul Tirassiens tiennent l'endroit pour maudit ; c'est pourquoi Val-Archer, dont il dépend, a préféré le tenir à distance de son bourg. La loi, ici, porte le nom d'Henry Collet, connétable, en charge des prisonniers, des sentences et des châtiments. Homme de rigueur plus que de nuance, il laissa néanmoins un jour la peur guider son jugement. Durant la Quatrième Guerre, comme une malédiction rongeait Val-Archer sans que nul n'en démêlât l'origine, il accusa dame Lucille Malvoie et la soumit à une série d'épreuves. Les faits la lavèrent pourtant de tout soupçon, appuyés par une lettre d'Evelyn Pare, maire de Val-Archer, qui scella son innocence.<br><br>Plus tard, la guerre contre le Sabbat malecarde, puis le déferlement du Fléau, jetèrent sur les routes une foule de villageois drustvari sans toit. Nombre d'entre eux gagnèrent la frontière, persuadés qu'une vie plus clémente les attendait à Boralus. Les conflits, toutefois, avaient alourdi les rouages de l'administration, si bien que l'attente s'éternisa et les immobilisa entre le pays qu'ils fuyaient et celui qui tardait à les accueillir. Ainsi s'est dressé, à quelques pas de l'arbre aux pendus, un campement où l'on trouvait non pas ceux qui viennent chercher fortune à Drustvar, mais ceux qui n'aspirent qu'à en partir.`, image: "Gibet.png" },

    { id: 40, name: "Guet de l'Ouest", x: 15.129, y: 6.836, type: "small", sound: "Karine.mp3", soundChance: 0.1, text: `Aucun sentier ne relie le Guet de l'Ouest à la terre ferme. Perché sur un rocher qui perce les flots au nord-ouest du Drustvar, il ne se laisse atteindre que par la mer, une plage et un modeste embarcadère formant l'unique point d'accostage, alors que la marée basse elle-même en défend l'approche. Son fanal n'en assume pas moins une fonction essentielle, car il guide les vaisseaux le long des rétives côtes drustvari, indiquant la route du Quai d'Accastillage tout en balisant la traversée du détroit qui s'ouvre sur le Quai du Trident.<br><br>Aujourd'hui encore, des vestiges drust y subsistent, rappelant qu'avant l'Amirauté de Kul Tiras, d'autres peuples habitaient ces terres. Désormais, seuls ses gardiens y demeurent et partagent ces grèves avec les crabes et les phoques. La Quatrième Guerre y vit pourtant s'établir l'Alliance, sous les ordres d'Amaeas Branchétoile, qui y commandait une compagnie réunissant sentinelles elfes de la nuit et soldats de Hurlevent, afin de protéger l'un des trois accès de l'archipel.`, image: "Guetdelouest.png" },

  /* ============================================================
     MOTEUR DE LA CARTE — pas besoin d'y toucher
     ============================================================ */
  const ORIG_W = 2048, ORIG_H = 1536;   // dimensions natives de la carte
  const stage = document.getElementById('map-stage');
  const wrap = document.getElementById('map-wrap');
  const img = document.getElementById('map-img');
  const markersLayer = document.getElementById('markers');

  function shapeHTML(type) {
    if (type === 'small')  return '<span class="shape-small"></span>';
    if (type === 'big')    return '<span class="shape-big"></span>';
    if (type === 'square') return '<span class="shape-square"></span>';
    return '<span class="shape-small"></span>';
  }

  function buildMarkers() {
    markersLayer.innerHTML = '';
    LOCATIONS.forEach(loc => {
      const m = document.createElement('div');
      m.className = 'marker';
      m.style.left = loc.x + '%';
      m.style.top = loc.y + '%';
      m.innerHTML = shapeHTML(loc.type);
      m.addEventListener('click', (e) => { e.stopPropagation(); openPopup(loc); });
      markersLayer.appendChild(m);
    });
  }

  /* ---- Zoom & déplacement ---- */
  let baseW = 0, baseH = 0;   // taille de la carte à l'échelle 1 (ajustée à l'écran)
  let scale = 1;              // facteur de zoom courant
  let tx = 0, ty = 0;         // décalage (translation) courant
  let minScale = 1;
  const MAX_SCALE = 6;

  // calcule la taille de base : la carte entière tient dans la fenêtre
  function computeBase() {
    const vw = stage.clientWidth, vh = stage.clientHeight;
    const fit = Math.min(vw / ORIG_W, vh / ORIG_H);
    baseW = ORIG_W * fit;
    baseH = ORIG_H * fit;
    wrap.style.width = baseW + 'px';
    wrap.style.height = baseH + 'px';
    // l'unité des marqueurs suit la taille de base (le zoom est géré par transform)
    wrap.style.setProperty('--u', (baseW / ORIG_W) + 'px');
  }

  function clamp() {
    const vw = stage.clientWidth, vh = stage.clientHeight;
    const w = baseW * scale, h = baseH * scale;
    // si la carte est plus petite que la fenêtre sur un axe, on la centre
    if (w <= vw) { tx = (vw - w) / 2; }
    else { tx = Math.min(0, Math.max(vw - w, tx)); }
    if (h <= vh) { ty = (vh - h) / 2; }
    else { ty = Math.min(0, Math.max(vh - h, ty)); }
  }

  function apply() {
    clamp();
    wrap.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
  }

  function resetView() {
    computeBase();
    scale = 1; minScale = 1;
    tx = 0; ty = 0;
    apply();
  }

  // zoom à la molette UNIQUEMENT avec Ctrl (évite le zoom accidentel)
  stage.addEventListener('wheel', (e) => {
    if (!e.ctrlKey) return;          // molette seule : on ne fait rien
    e.preventDefault();
    const rect = stage.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;
    const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
    zoomAt(cx, cy, factor);
  }, { passive: false });

  // zoom centré sur un point de l'écran (cx, cy) par un facteur
  function zoomAt(cx, cy, factor) {
    const newScale = Math.min(MAX_SCALE, Math.max(minScale, scale * factor));
    if (newScale === scale) return;
    const k = newScale / scale;
    tx = cx - k * (cx - tx);
    ty = cy - k * (cy - ty);
    scale = newScale;
    apply();
  }

  // boutons +/- : zoom centré sur le milieu de la carte visible
  function zoomButton(dir) {
    const factor = dir > 0 ? 1.3 : 1 / 1.3;
    zoomAt(stage.clientWidth / 2, stage.clientHeight / 2, factor);
  }

  // déplacement à la souris
  let dragging = false, moved = false, sx = 0, sy = 0;
  stage.addEventListener('mousedown', (e) => {
    if (e.target.closest('#zoom-controls')) return;  // pas de glisser sur les boutons
    dragging = true; moved = false;
    sx = e.clientX - tx; sy = e.clientY - ty;
    stage.classList.add('dragging');
  });
  window.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    tx = e.clientX - sx; ty = e.clientY - sy;
    moved = true;
    apply();
  });
  window.addEventListener('mouseup', () => {
    dragging = false;
    stage.classList.remove('dragging');
  });

  // double-clic : réinitialise la vue d'ensemble
  stage.addEventListener('dblclick', (e) => {
    if (e.target.closest('#zoom-controls')) return;
    resetView();
  });

  /* ---- Tactile : pincer pour zoomer, glisser pour déplacer ---- */
  let touchMode = null, lastDist = 0, lastMid = null;
  stage.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      touchMode = 'pan';
      sx = e.touches[0].clientX - tx; sy = e.touches[0].clientY - ty;
    } else if (e.touches.length === 2) {
      touchMode = 'pinch';
      lastDist = touchDist(e); lastMid = touchMid(e);
    }
  }, { passive: false });
  stage.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (touchMode === 'pan' && e.touches.length === 1) {
      tx = e.touches[0].clientX - sx; ty = e.touches[0].clientY - sy;
      apply();
    } else if (touchMode === 'pinch' && e.touches.length === 2) {
      const dist = touchDist(e), mid = touchMid(e);
      const rect = stage.getBoundingClientRect();
      const cx = mid.x - rect.left, cy = mid.y - rect.top;
      const newScale = Math.min(MAX_SCALE, Math.max(minScale, scale * (dist / lastDist)));
      const k = newScale / scale;
      tx = cx - k * (cx - tx);
      ty = cy - k * (cy - ty);
      scale = newScale;
      lastDist = dist;
      apply();
    }
  }, { passive: false });
  stage.addEventListener('touchend', (e) => {
    if (e.touches.length === 0) touchMode = null;
    else if (e.touches.length === 1) { touchMode = 'pan'; sx = e.touches[0].clientX - tx; sy = e.touches[0].clientY - ty; }
  });
  function touchDist(e) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    return Math.hypot(dx, dy);
  }
  function touchMid(e) {
    return { x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
             y: (e.touches[0].clientY + e.touches[1].clientY) / 2 };
  }

  /* ---- Pop-up ---- */
  const overlay = document.getElementById('overlay');
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');

  /* ============================================================
     GLOSSAIRE — définitions affichées en infobulle au survol.
     Chaque mot en gras (<b>Mot</b>) dont le texte figure ici
     reçoit automatiquement son infobulle, dans TOUS les pop-ups.
     Pour ajouter une définition : "Terme exact": "Texte de la bulle",
     ============================================================ */
  const GLOSSAIRE = {
    "tour Crefort": "La tour Crefort est un ouvrage de guet perché sur les hauteurs qui dominent la forêt Cramoisie, à l'est. Elle appartient à la maison éponyme.",
    "maison Crefort": "Les guerres contre les drust scellèrent l'allégeance de la maison Crefort à la maison Malvoie, qu'elle honora durant des millénaires. En trahissant toutefois ses suzerains au profit des Bonval, la lignée frôla le néant, si bien qu'elle se résume désormais à Cierra Crefort, son unique survivante.",
    "Crefort": "Les guerres contre les drust scellèrent l'allégeance de la maison Crefort à la maison Malvoie, qu'elle honora durant des millénaires. En trahissant toutefois ses suzerains au profit des Bonval, la lignée frôla le néant, si bien qu'elle se résume désormais à Cierra Crefort, son unique survivante.",
    "maison Bonval": "Autrefois, la bourgade de Froidecombe relevait de la maison Bonval. Marc Bonval, qui en fut l'ultime seigneur, osa défier la maison Malvoie et c'est précisément cette rébellion qui condamna sa lignée à l'extinction.",
    "Bonval": "Autrefois, la bourgade de Froidecombe relevait de la maison Bonval. Marc Bonval, qui en fut l'ultime seigneur, osa défier la maison Malvoie et c'est précisément cette rébellion qui condamna sa lignée à l'extinction.",
    "Malvoie": "Nul ne saurait disputer aux Malvoie leur emprise sur Drustvar, tant leur légitimité plonge dans un passé lointain : voilà plus de deux millénaires que leur aïeul Arom Malvoie terrassa les drust et fit régner la paix sur tout Kul Tiras. Si la Quatrième Guerre faillit emporter sa maison, celle-ci se perpétue aujourd'hui sous l'autorité de Lucille Malvoie.",
    "maison Malvoie": "Nul ne saurait disputer aux Malvoie leur emprise sur Drustvar, tant leur légitimité plonge dans un passé lointain : voilà plus de deux millénaires que leur aïeul Arom Malvoie terrassa les drust et fit régner la paix sur tout Kul Tiras. Si la Quatrième Guerre faillit emporter sa maison, celle-ci se perpétue aujourd'hui sous l'autorité de Lucille Malvoie.",
    "Hattie Crefort": "Mère de Cierra Crefort, Hattie Crefort gouverna la maison éponyme jusqu'à sa mort. C'est son attachement à la maison Bonval qui la conduisit sur le champ de bataille, où elle tomba durant leur insurrection.",
    "Froidecombe": "Dressée sur les hauteurs septentrionales de la Ferté-d'Arom, la place forte de Froidecombe relevait autrefois de l'autorité de la maison Bonval. Or, depuis que cette dernière s'est éteinte, elle s'administre désormais en municipalité.",
    "Heideck Tertrebois": "Au sein de sa maison, Heideck Tertrebois se distingue tout autant par ses talents d'alchimiste que par ses exploits guerriers. Sa réputation n'échappe pourtant pas à quelques zones d'ombre, puisque certains le tiennent pour responsable du conflit qui ensanglanta Froidecombe.",
    "Dame Lucille Malvoie": "Devenue héritière des Malvoie après le décès de son père, Lucille vit sa mère, dame Meredith, sombrer sous l'emprise du Sabbat malecarde. Résolue dès lors à purger Drustvar des sorcières et à laver l'honneur de sa maison, la jeune dame joignit ses forces à celles des aventuriers de l'Alliance et fit renaître l'Ordre des Braises.",
    "Dame Malvoie": "Devenue héritière des Malvoie après le décès de son père, Lucille vit sa mère, dame Meredith, sombrer sous l'emprise du Sabbat malecarde. Résolue dès lors à purger Drustvar des sorcières et à laver l'honneur de sa maison, la jeune dame joignit ses forces à celles des aventuriers de l'Alliance et fit renaître l'Ordre des Braises.",
    "Cierra Crefort": "Cierra Crefort représente l'ultime héritière de la maison Crefort. Sa lignée s'est en effet effondrée pour trahison ; elle-même, néanmoins, encore enfant, échappa au sort des siens.",
    "manoir Malvoie": "Siège immémorial de la maison Malvoie, l'imposante demeure connut une période sombre lorsque les sorcières du Sabbat malecarde s'y installèrent et y ancrèrent leur influence maléfique, avant d'en être chassées.",
    "Marc Bonval": "Lorsque son père, Aloïs, fut mené à l'échafaud des Hauts-de-Corlain pour avoir comploté contre dame Lucille Malvoie, Marc Bonval s'octroya le titre de seigneur de Froidecombe. Refusant néanmoins de se soumettre et de prêter serment en dépit de la conduite paternelle, il défia l'autorité drustvari et érigea Froidecombe en place de siège. La mort l'y saisit dans le fracas d'une explosion, œuvre de Freyda Castellot.",
    "Passe Ouest": "Parmi les accès qui conduisent à Froidecombe figure la Passe Ouest. Quand la rébellion des Bonval valut au bourg d'être assiégé, elle accueillit le camp d'une partie des assaillants Malvoie. Le commandement de ce front revient d'abord au seigneur Lesfred Tertrebois, avant d'échoir à son vassal Eirik de Ruyter.",
    "Lesfred": "Durant les heures sombres de la Quatrième Guerre et de la montée en puissance du Sabbat malecarde, Lesfred Tertrebois portait le titre de seigneur de sa maison. Ses épreuves lui valurent le surnom de « Fléau du Sabbat », puis l'honneur d'entrer, sous l'égide de dame Lucille Malvoie, parmi les chevaliers de l'Amirauté de Kul Tiras. Il trouva néanmoins la mort au soulèvement des Bonval, vaincu dans un duel en griffon par le seigneur Marc Bonval.",
    "Adèle Tertrebois": "Née Deauclaire, Adèle Tertrebois gravit les rangs de l'Amirauté des Portvaillant jusqu'au grade de lieutenant, avant d'unir sa destinée à celle du seigneur Lesfred Tertrebois. Le siège de Froidecombe scella néanmoins leur sort commun et tous deux y périrent à quelques jours d'intervalle.",
    "maison Rougepince": "C'est à Capembrun, bourg tourné vers la mer, que la maison Rougepince fait valoir son autorité, laquelle s'incarne en la personne de Darius Rougepince. Son patrimoine s'est du reste enrichi tout récemment de l'ancien manoir Bonval de Froidecombe, que la lignée reçut en récompense de son engagement militaire.",
    "maison Chantorage": "Consacrée à la Mère des Marées et détentrice de l'ordre des Eaugures, la maison Chantorage occupe une place à part parmi les grandes lignées de Kul Tiras, régnant sur la vallée qui porte son nom. Sa direction connut cependant un bouleversement lorsque la trahison du seigneur Colm Chantorage la fit passer entre les mains de Brannon, le neveu de ce dernier.",
    "Mère des Marées": "Entité océanique, la Mère des Marées fait l'objet d'un culte fervent parmi les habitants de Kul Tiras. Depuis les abysses, cette puissance adresse sa voix aux eaugures, seuls à même de la discerner dans les soupirs de l'océan.",
    "reine Azshara": "Souveraine des elfes de la nuit en des temps révolus, la reine Azshara vit son destin basculer avec la Grande Fracture, qui la précipita à la tête des nagas. Une telle déchéance ne fit du reste que la livrer aux manœuvres du Dieu très ancien N'Zoth.",
    "N'Zoth": "Le Dieu très ancien N'Zoth, tapi tout au fond des flots, épanchait sa parole malfaisante dans les murmures de l'onde pour entraîner le monde à sa perte. Nul hasard, dès lors, si la corruption qui rongea les eaugures au fil de la Quatrième Guerre et dénatura la maison Chantorage procédait de cette entité cauchemardesque.",
    "Horde": "Coalition d'envahisseurs barbares, la Horde porte la responsabilité du naufrage de la flotte de Kul Tiras et de la mort de Derek Portvaillant lors de la Deuxième Guerre, avant de causer celle de Daelin Portvaillant. Aussi incarne-t-elle l'ennemi honni par excellence, tant ce ramassis d'orcs, de morts-vivants et de créatures monstrueuses a ouvert, par sa trahison et sa brutalité, des plaies que les années n'ont su cicatriser.",
    "Compagnie des Barges": "La compagnie des Barges rassemble des chasseurs de monstres dévoués à la sauvegarde de Kul Tiras contre les périls venus du dehors. Sous la conduite de Rosaline Madison, elle inscrit à son palmarès la défense du Quai du Trident, d'abord face au colossal kraken Viq'Goth, puis contre la Horde.",
    "maison Sombrabysse": "Placée sous l'autorité d'Horace Sombrabysse, la maison Sombrabysse veille sur le Quai du Trident, charge qui lui échut lorsque le seigneur Brannon Chantorage prit la tête de sa propre lignée. Rares, du reste, sont les maisons capables de rivaliser avec elle pour la valeur guerrière comme pour l'expérience maritime.",
    "Brannon Chantorage": "Brannon Chantorage est le seigneur de la maison Chantorage, dont son propre oncle assurait jadis la direction. C'est d'ailleurs ce dernier qui le plaça à la tête du Quai du Trident, où il lui fallut affronter la corruption qui gagnait la population. Lui-même en fut néanmoins épargné, la rumeur voulant qu'il soit dépourvu du don des eaugures ; aussi, lorsque Colm Chantorage disparut, put-il accéder à la tête de la vallée éponyme.",
    "Chasseru": "Chasseru désigne une portion de forêt qui s'étend au sud du domaine Tertrebois. De mémoire de Drustvari, ce territoire giboyeux offre depuis toujours un terrain de chasse de choix, foisonnant de gibier comme de prédateurs.",
    "domaine Tertrebois": "Au cœur des forêts qui recouvrent l'est de Drustvar se dissimule le domaine Tertrebois, fief de la maison éponyme. Les bois qui l'enserrent lui ont forgé sa renommée, laquelle repose sur les métiers sylvestres : chasse, herboristerie, travail du cuir et autres savoir-faire nés de la forêt.",
    "Sabbat malecarde": "Durant la Quatrième Guerre, Drustvar tout entier vécut dans l'effroi que faisait régner le Sabbat malecarde. Dame Meredith Malvoie l'aurait fondé dans l'espoir de soustraire son époux, le seigneur Arthur Malvoie, à la mort, y réunissant des femmes que l'antique magie des drust défigurait à mesure qu'elles la mettaient au service du roi-sorcier Gorak Tul. Dès lors, le cénacle réduisit les habitants de la région en servitude et gangrena des territoires entiers, avant que l'Ordre des Braises ne parvînt à l'anéantir.",
    "Fléau": "Longtemps, le Fléau ne représenta pour Kul Tiras qu'un péril distant et cauchemardesque : une armée de morts-vivants pliée à la volonté du Roi-liche, dont les récits macabres ne parvenaient guère que par ouï-dire. Tout changea au lendemain de la Quatrième Guerre, lorsqu'une fraction de cette horde, délivrée de l'emprise de son maître, se dressa contre Azeroth tout entière.",
    "maison Tertrebois": "Établie dans l'est de Drustvar où se trouve son fief, la maison Tertrebois a marqué l'actualité récente par des faits contrastés, glorieux pour les uns, plus nuancés pour les autres. Elima Tertrebois y exerce présentement la régence au nom de son neveu Tobias.",
    "Tobias Tertrebois": "Tobias Tertrebois incarne l'héritier de la maison Tertrebois, appelé à en prendre la seigneurie dès qu'il atteindra sa majorité. Orphelin, il grandit aux côtés de sa sœur jumelle, Eleonora, sous la tutelle de leur tante, laquelle veille sur leur éducation autant qu'elle assure, dans l'intervalle, la régence du domaine.",
    "Havrebrune": "Sous la houlette du maire Cyril Leblanc, Havrebrune prospérait à l'est de Drustvar grâce à ses terres cultivées et à son élevage de porcs. Au cours de la Quatrième Guerre, néanmoins, la magie noire du Sabbat malecarde s'abattit sur le village : une sorcière y pétrifia les habitants, qui demeurèrent vivants dans l'immobilité jusqu'à ce que des aventuriers vinssent rompre l'enchantement. Le bourg renaquit alors et retrouva son effervescence d'autrefois, avant que le Fléau mort-vivant ne le dévastât à son tour.",
    "maison Ruisseval": "Les terres de Ruisseval appartenaient à la maison éponyme, dont l'ultime seigneur, Thomasin de Ruisseval, choisit de se placer sous la vassalité de sa voisine, la maison Tertrebois. Le titre échut à sa fille Ariane lorsqu'il mourut ; celle-ci, toutefois, fut emportée prématurément par le Fléau. Faute de descendance, la lignée s'éteignit et ses domaines passèrent à la maison Tertrebois, qui les incorpora aux siens.",
    "Ruisseval": "Ruisseval fut un petit village florissant de Drustvar, dont la prospérité reposait sur ses cultures et ses bois foisonnant de gibier. Cette abondance prit fin avec la Quatrième Guerre, quand la corruption du Sabbat malecarde dépeupla le hameau et l'abandonna à des créatures ensorcelées. Un redressement laborieux lui rendit un temps la vie, avant que le Fléau mort-vivant ne le terrassât à son tour. De ce naufrage il ne resta que des ruines, bientôt démantelées sur ordre d'Elima Tertrebois pour en récupérer les matériaux de construction.",
    "Elima": "Elima Tertrebois compte parmi les vétérans de la Quatrième Guerre, qu'elle traversa comme officier de la 7ᵉ Légion. Sa trajectoire bascula toutefois à la mort de son frère, le seigneur Lesfred Tertrebois, tombé au siège de Froidecombe. Renonçant à sa carrière militaire, elle endossa dès lors la régence du domaine. C'est à ce titre qu'elle veille aujourd'hui sur l'éducation des héritiers du défunt, Tobias et Eleonora.",
    "Elima Tertrebois": "Elima Tertrebois compte parmi les vétérans de la Quatrième Guerre, qu'elle traversa comme officier de la 7ᵉ Légion. Sa trajectoire bascula toutefois à la mort de son frère, le seigneur Lesfred Tertrebois, tombé au siège de Froidecombe. Renonçant à sa carrière militaire, elle endossa dès lors la régence du domaine. C'est à ce titre qu'elle veille aujourd'hui sur l'éducation des héritiers du défunt, Tobias et Eleonora.",
    "Heideck": "Au sein de sa maison, Heideck Tertrebois se distingue tout autant par ses talents d'alchimiste que par ses exploits guerriers. Sa réputation n'échappe pourtant pas à quelques zones d'ombre, puisque certains le tiennent pour responsable du conflit qui ensanglanta Froidecombe.",
    "cimetière": "À l'est de Drustvar s'étend le cimetière Tertrebois, que sa vaste superficie a rendu célèbre. Durant la Quatrième Guerre, une sorcière du Sabbat malecarde y accomplit de profanes cérémonies, soulevant les esprits contre les vivants dans le dessein de retourner de puissantes âmes contre les terres qu'elles s'étaient engagées à défendre. Il fallut sa mort pour que la quiétude regagnât ces lieux. Répit éphémère, puisque les morts-vivants du Fléau devaient à leur tour en profaner le sol. Ce n'est qu'au prix de grands sacrifices que la nécropole finit, une nouvelle fois, par retrouver la paix.",
    "Vide": "Puissance primordiale à l'appétit vampirique, le Vide se dissimule par-delà les limites de la réalité, brûlant de dévorer toute énergie et de miner la création jusqu'à la démence. Pour Kul Tiras, cette force distante et insaisissable prit corps à travers les murmures corrupteurs qui gagnèrent certains eaugures et souillèrent la maison Chantorage.",
    "Quatrième Guerre": "Conflit d'ampleur mondiale, la Quatrième Guerre dressa l'Alliance contre la Horde pour la maîtrise de l'azérite, cette matière née de la blessure que le titan Sargeras avait infligée au monde. C'est elle qui arracha Kul Tiras à son isolement pour la ramener dans le giron de l'Alliance, sous l'impulsion de Jaina Portvaillant, revenue reconquérir la loyauté de son royaume natal. Ce fut également au cours de cette guerre que N'Zoth et la reine Azshara sortirent de l'ombre, tandis que la corruption du Sabbat malecarde et de la maison Chantorage ensanglantait l'archipel.",
    "drust": "Voici quelque deux mille sept cents ans, bien avant l'arrivée des premiers colons humains, Kul Tiras appartenait à l'antique peuple des drust. Maîtres d'une redoutable magie de mort, ceux-ci se soulevèrent contre les nouveaux venus sous la conduite de leur roi-sorcier Gorak Tul, avant de succomber face aux ancêtres de la maison Malvoie. Leurs vestiges, routes et ruines parsèment aujourd'hui encore Drustvar. Leurs esprits, quant à eux, trouvèrent refuge dans le royaume de Thros, d'où ils n'eurent de cesse de vouloir revenir parmi les vivants ; une ambition qu'ils faillirent réaliser durant la Quatrième Guerre par l'entremise du Sabbat malecarde.",
    "milice drustvari": "La milice drustvari désigne la ligue d'humains qui, la première, tint tête aux drust et finit par les vaincre. Sa formation répondit à l'offensive que ces derniers, guidés par Gorak Tul, lancèrent contre les premiers établissements des colons. Placée sous le commandement d'Arom Malvoie et instruite par le savoir de l'Ordre des Braises, elle refoula peu à peu l'assaillant jusqu'à Gol Osigr, terme de cette reconquête où Arom terrassa le roi-sorcier.",
    "Griseroche": "Aux lisières de la forêt Cramoisie, Griseroche s'élève depuis près de deux mille sept cents ans sur les ruines d'une forteresse drust, que la maison Forpin garde sans relâche. Sa raison d'être résidait autrefois dans la surveillance du dernier territoire drust, un rôle qui perdit de son sens lorsque ce peuple s'éteignit du monde d'Azeroth, si bien qu'au fil des siècles le bourg se replia sur lui-même et déclina peu à peu.",
    "Forpin": "Aux temps anciens, si la majorité des premiers colons Kultirassiens reconnaissaient l'Empire d'Arathor pour patrie et la province de Gilnéas pour berceau, les Forpin, eux, se réclamaient de la tribu alteraci d'Ignaeus Trollemort. Pour des raisons qu'ils omirent de préciser, ils bravèrent la mer pour grossir les rangs de la milice drustvari et servir la cause d'Arom Malvoie, qui récompensa leur engagement en leur confiant la garde de Griseroche, depuis lors leur fief.",
    "maison Forpin": "Aux temps anciens, si la majorité des premiers colons Kultirassiens reconnaissaient l'Empire d'Arathor pour patrie et la province de Gilnéas pour berceau, les Forpin, eux, se réclamaient de la tribu alteraci d'Ignaeus Trollemort. Pour des raisons qu'ils omirent de préciser, ils bravèrent la mer pour grossir les rangs de la milice drustvari et servir la cause d'Arom Malvoie, qui récompensa leur engagement en leur confiant la garde de Griseroche, depuis lors leur fief.",
    "Ferté-d'Arom": "Au centre de Drustvar s'élève la Ferté-d'Arom, ville qui tient son nom d'Arom Malvoie, premier seigneur de la région et vainqueur des drust. Soumise à l'autorité de dame Lucille Malvoie, elle abrite le quartier général de l'Ordre des Braises, une confrérie d'inquisiteurs vouée à la traque des sorcières. C'est là que, durant la Quatrième Guerre, affluèrent les réfugiés de Corlain fuyant le Sabbat malecarde, parmi lesquels s'étaient glissées des sorcières infiltrées. Il revient à Lucille et aux aventuriers qui l'accompagnaient d'en purger la menace.",
    "mont Cortis": "Dressé au sud de Drustvar, le mont Cortis élève sa cime au point le plus haut de tout Kul Tiras. Repère majestueux dominant les reliefs méridionaux de l'archipel, il ne se laisse gravir qu'au prix de grands efforts.",
    "forêt Cramoisie": "La forêt Cramoisie couvre une vaste étendue boisée à l'ouest de Drustvar. Durant la Quatrième Guerre, les sorcières du Sabbat malecarde y déferlèrent avec leurs golems d'osier, gagnant les ruines drust ensevelies sous les frondaisons pour y célébrer un rituel censé invoquer Gorak Tul, leur maître. On prête d'ailleurs à ces vestiges un passage dérobé vers Thros, la terre d'exil des drust.",
    "Gorak Tul": "Chef sauvage autant que sorcier redoutable, Gorak Tul souleva les drust contre les premiers colons humains, mais dut s'incliner devant Arom Malvoie. Sa défaite ne l'emporta pas pour autant, et il patienta des siècles dans la terre maudite de Thros. Son heure parut sonner avec la Quatrième Guerre, quand il jeta son dévolu sur dame Meredith Malvoie, brisée par le deuil, pour diffuser à travers elle et le Sabbat malecarde sa magie de mort sur tout Drustvar. L'Ordre des Braises, bientôt relayé par Katherine et Jaina Portvaillant, firent voler en éclats ce funeste projet.",
    "foudrargent": "Le foudrargent, que l'on extrait des filons de Kul Tiras et de Zandalar, offre une résistance à la corrosion qui le prédestine à la construction des navires. Sa légèreté n'est pas en reste, puisqu'elle séduit corsaires, pirates et marins ; ceux-ci en façonnent des armures assez légères pour nager sans la moindre entrave.",
    "dame Lucille Malvoie": "Devenue héritière des Malvoie après le décès de son père, Lucille vit sa mère, dame Meredith, sombrer sous l'emprise du Sabbat malecarde. Résolue dès lors à purger Drustvar des sorcières et à laver l'honneur de sa maison, la jeune dame joignit ses forces à celles des aventuriers de l'Alliance et fit renaître l'Ordre des Braises.",
    "Drustvar": "Drustvar compte parmi les grandes possessions de Kul Tiras et relève de la maison Malvoie, qui figure au rang des lignées éminentes du royaume. Située à l'ouest de l'archipel, la province déploie d'épaisses forêts sur des reliefs qu'un froid tenace ne cesse d'éprouver. Cette terre austère se révèle pourtant doublement féconde : d'une part, ses gisements produisent la majeure partie du minerai extrait dans le pays ; d'autre part, ses rangs livrent à l'amirauté quelques-uns de ses combattants les plus endurcis.",
    "Rade de Tiragarde": "Véritable cœur du royaume, la Rade de Tiragarde est la plus étendue et la plus centrale des trois grandes régions de Kul Tiras. Son relief montagneux est scindé par une baie immense dont les eaux s'ouvrent sur la Grande Mer, et c'est sur ce rivage que se dresse Boralus. Dans la capitale siège en effet la maison Portvaillant, à laquelle échoit le gouvernement de l'archipel.",
    "Pointe du Gibet": "Dans l'est drustvari, la justice s'exerce à la Pointe du Gibet, lieu qui occupe un promontoire surplombé par un vieil arbre tordu, jadis reconverti en potence. Rares sont donc ceux qui s'y aventurent le cœur léger ; l'endroit n'en offre pas moins l'un des deux seuls accès terrestres entre Drustvar et la Rade de Tiragarde.",
    "Kul Tirassiens": "Habitants du royaume insulaire de Kul Tiras, nation humaine dont l'archipel s'étend loin des Royaumes de l'Est, les Kul Tirassiens ont fait de la mer le cœur de leur existence. Puisque la navigation relève chez eux de la vocation, c'est dans l'océan qu'ils puisent tout ce qui les caractérise, depuis leur culture et leur foi jusqu'à leur économie et leur fierté.",
    "Kul Tirassien": "Habitants du royaume insulaire de Kul Tiras, nation humaine dont l'archipel s'étend loin des Royaumes de l'Est, les Kul Tirassiens ont fait de la mer le cœur de leur existence. Puisque la navigation relève chez eux de la vocation, c'est dans l'océan qu'ils puisent tout ce qui les caractérise, depuis leur culture et leur foi jusqu'à leur économie et leur fierté.",

    "Tirrasien": "Habitants du royaume insulaire de Kul Tiras, nation humaine dont l'archipel s'étend loin des Royaumes de l'Est, les Kul Tirassiens ont fait de la mer le cœur de leur existence. Puisque la navigation relève chez eux de la vocation, c'est dans l'océan qu'ils puisent tout ce qui les caractérise, depuis leur culture et leur foi jusqu'à leur économie et leur fierté.",
    "Val-Archer": "Val-Archer prospère dans l'est de Drustvar, grand village où bûcherons et mineurs vivent ensemble sous l'autorité de la mairesse Evelyn Pare. Cette communauté laborieuse subit néanmoins, pendant la Quatrième Guerre, le même destin que bien des bourgs drustvari : non seulement une malédiction s'y abattit, mais l'accusation injuste qu'elle suscita faillit compromettre le salut de la région.",
    "Henry Collet": "Gardien de la loi à la Pointe du Gibet, le connétable Henry Collet a la responsabilité des prisonniers, des procès et des exécutions du secteur. Il s'acquitte de cette charge sous l'autorité d'Evelyn Pare, maire de Val-Archer.",
    "Evelyn Pare": "Evelyn Pare exerce la charge de maire à Val-Archer, village drustvari qu'elle administre. Si les gens du pays la tiennent pour une dirigeante trempée dans l'adversité, c'est qu'au plus fort de la Quatrième Guerre, tandis que les menées du Sabbat malecarde risquaient de disloquer sa communauté, elle sut ne rien céder.",
    "Boralus": "Boralus, capitale et plus grande cité de Kul Tiras, abrite la maison Portvaillant, à qui revient le gouvernement de l'archipel. C'est aussi de cette ville que rayonnent le commerce et la puissance militaire de la nation tout entière.",
  };

  /* Termes mis en gras SANS forcément avoir d'infobulle.
     La mise en gras couvre : toutes les clés de GLOSSAIRE + cette liste.
     (première occurrence de chaque terme dans chaque texte) */
  const TERMES_SANS_DEF = [
    "Guet de l'Ouest",
    "drustvari",
    "Quai d'Accastillage",
    "Quai du Trident",
    "Amirauté de Kul Tiras",
    "Alliance",
    "Amaeas Branchétoile",
    "Hurlevent",
    "Kul Tiras",
    "Grande mer",
  ];

  function openPopup(loc) {
    if (moved) return; // ne pas ouvrir si on vient de glisser
    // private joke : son joué aléatoirement selon la probabilité du lieu
    if (loc.sound && Math.random() < (loc.soundChance || 1)) {
      try { new Audio(loc.sound).play().catch(() => {}); } catch (e) {}
    }
    document.getElementById('popup-title').textContent = loc.name || ('Lieu n°' + loc.id);
    // image(s) (blason) éventuelle(s) : loc.images (liste) ou loc.image (unique)
    const imgBox = document.getElementById('popup-image');
    imgBox.innerHTML = '';
    const imgList = loc.images ? loc.images : (loc.image ? [loc.image] : []);
    imgList.forEach(src => {
      const im = document.createElement('img');
      im.src = src;
      im.alt = loc.name || '';
      im.title = "Cliquer pour agrandir";
      im.addEventListener('click', () => openLightbox(src, loc.name));
      imgBox.appendChild(im);
    });
    // devise éventuelle (entre le blason et le texte)
    const deviseBox = document.getElementById('popup-devise');
    deviseBox.innerHTML = loc.devise ? '<span class="devise-inner">' + loc.devise + '</span>' : '';
    const bodyEl = document.getElementById('popup-body');
    bodyEl.innerHTML = loc.text || '';
    appliquerGloses(bodyEl);   // ajoute les infobulles aux mots connus du glossaire
    overlay.classList.add('open');
  }

  // Ajoute une infobulle à chaque <b> dont le texte figure dans GLOSSAIRE
  function appliquerGloses(container) {
    // Liste de tous les termes à mettre en gras : clés du glossaire + termes sans définition.
    // Triés du plus long au plus court pour prioriser les expressions composées.
    const termes = Object.keys(GLOSSAIRE)
      .concat(TERMES_SANS_DEF)
      .filter((t, i, arr) => arr.indexOf(t) === i)
      .sort((a, b) => b.length - a.length);

    let htmlTexte = container.innerHTML;
    const dejaVus = new Set();

    // échappe les caractères spéciaux regex
    const echap = s => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    // caractères considérés comme "lettre" pour les frontières de mot (accents inclus).
    // L'apostrophe n'est PAS incluse : l'élision (l', d', qu') sépare bien les mots.
    const L = "A-Za-zÀ-ÿ";

    termes.forEach(terme => {
      if (dejaVus.has(terme)) return;
      // frontières : ni lettre juste avant, ni lettre juste après
      const re = new RegExp('(?<![' + L + '])(' + echap(terme) + ')(?![' + L + '])');
      htmlTexte = remplacerHorsBalises(htmlTexte, re, terme);
    });

    container.innerHTML = htmlTexte;

    // applique les infobulles aux <b> dont le mot est dans le glossaire
    container.querySelectorAll('b').forEach(el => {
      const info = GLOSSAIRE[el.textContent.trim()];
      if (info) {
        el.classList.add('glose');
        el.setAttribute('data-info', info);
      }
    });

    function remplacerHorsBalises(html, regex, terme) {
      // split en gardant les balises <...> intactes
      const parts = html.split(/(<[^>]+>)/);
      let fait = false;
      for (let i = 0; i < parts.length && !fait; i++) {
        if (parts[i].startsWith('<')) continue;      // c'est une balise, on saute
        if (parts[i].indexOf('\x00') !== -1) continue;
        const m = regex.exec(parts[i]);
        if (m) {
          parts[i] = parts[i].slice(0, m.index) + '<b>' + m[1] + '</b>' + parts[i].slice(m.index + m[0].length);
          fait = true;
        }
      }
      return parts.join('');
    }
  }
  function closePopup() {
    overlay.classList.remove('open');
  }
  function openLightbox(src, alt) {
    lightboxImg.src = src;
    lightboxImg.alt = alt || '';
    lightbox.classList.add('open');
  }
  function closeLightbox() {
    lightbox.classList.remove('open');
    lightboxImg.src = '';
  }
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closePopup(); });
  lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Escape') return;
    if (lightbox.classList.contains('open')) closeLightbox();  // l'image se ferme en premier
    else closePopup();
  });

  /* ---- Infobulle au survol des mots .glose ---- */
  const tooltip = document.getElementById('tooltip');
  const popupBody = document.getElementById('popup-body');

  function showTooltip(el) {
    const info = el.getAttribute('data-info');
    if (!info) return;
    tooltip.innerHTML = info;
    tooltip.classList.add('show');
    positionTooltip(el);
  }
  function hideTooltip() {
    tooltip.classList.remove('show', 'below');
  }
  function positionTooltip(el) {
    const r = el.getBoundingClientRect();
    // mesurer la bulle
    tooltip.style.left = '0px';
    tooltip.style.top = '0px';
    const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
    const margin = 8;
    // centré horizontalement sur le mot, borné à l'écran
    let cx = r.left + r.width / 2;
    let left = cx - tw / 2;
    left = Math.max(margin, Math.min(window.innerWidth - tw - margin, left));
    // au-dessus si possible, sinon en dessous
    let top = r.top - th - 10;
    let below = false;
    if (top < margin) { top = r.bottom + 10; below = true; }
    tooltip.style.left = left + 'px';
    tooltip.style.top = top + 'px';
    tooltip.classList.toggle('below', below);
    // flèche pointant vers le mot
    const arrowX = Math.max(12, Math.min(tw - 12, cx - left));
    tooltip.style.setProperty('--arrow-x', arrowX + 'px');
  }

  // délégation : un seul écouteur sur le corps du texte
  popupBody.addEventListener('mouseover', (e) => {
    const g = e.target.closest('.glose');
    if (g) showTooltip(g);
  });
  popupBody.addEventListener('mouseout', (e) => {
    const g = e.target.closest('.glose');
    if (g) hideTooltip();
  });
  // masquer la bulle si on ferme le pop-up ou on défile
  popupBody.addEventListener('scroll', hideTooltip);

  /* ---- Init ---- */
  document.getElementById('zoom-in').addEventListener('click', () => zoomButton(1));
  document.getElementById('zoom-out').addEventListener('click', () => zoomButton(-1));
  document.getElementById('zoom-reset').addEventListener('click', resetView);
  window.addEventListener('resize', resetView);
  buildMarkers();
  if (img.complete) resetView(); else img.addEventListener('load', resetView);
</script>
</body>

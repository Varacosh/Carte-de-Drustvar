<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte de Drustvar</title>
<style>
  /* ====== Carte interactive de Drustvar ====== */
  :root {
    --ink: #3d2008;          /* couleur des marqueurs (brun sépia) */
    --popup-bg: #f3ecd8;     /* fond parchemin du pop-up */
    --popup-border: #3d2008;
    --popup-text: #2a1c0c;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: #11161c;
    font-family: "Georgia", "Times New Roman", serif;
  }

  #map-wrap {
    position: relative;
    display: block;
    width: 100%;
    max-width: 2048px;     /* largeur native de la carte */
    margin: 0 auto;
    --u: 1px;              /* 1 unité = 1px de la carte d'origine, recalculé en JS */
  }
  #map-img {
    display: block;
    width: 100%;
    height: auto;
    user-select: none;
  }
  #markers {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* ---- Marqueurs ---- */
  .marker {
    position: absolute;
    transform: translate(-50%, -50%);
    cursor: pointer;
    z-index: 2;
  }
  .shape-small {
    display: block;
    width: max(6px, calc(11 * var(--u)));
    height: max(6px, calc(11 * var(--u)));
    border-radius: 50%;
    background: var(--ink);
  }
  .shape-big {
    width: max(14px, calc(26 * var(--u)));
    height: max(14px, calc(26 * var(--u)));
    border-radius: 50%;
    border: max(2px, calc(4 * var(--u))) solid var(--ink);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .shape-big::after {
    content: '';
    width: max(4px, calc(8 * var(--u)));
    height: max(4px, calc(8 * var(--u)));
    border-radius: 50%;
    background: var(--ink);
  }
  .shape-square {
    width: max(14px, calc(26 * var(--u)));
    height: max(14px, calc(26 * var(--u)));
    border: max(2px, calc(4 * var(--u))) solid var(--ink);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .shape-square::after {
    content: '';
    width: max(4px, calc(9 * var(--u)));
    height: max(4px, calc(9 * var(--u)));
    background: var(--ink);
  }

  .marker:hover { z-index: 5; }
  .marker:hover .shape-small,
  .marker:hover .shape-big,
  .marker:hover .shape-square {
    outline: 2px solid rgba(201, 164, 92, 0.95);
    outline-offset: 3px;
    filter: drop-shadow(0 0 4px rgba(201, 164, 92, 0.7));
  }

  .marker .tip {
    position: absolute;
    bottom: 135%;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(20, 14, 6, 0.9);
    color: #f3ecd8;
    font-size: 13px;
    padding: 3px 8px;
    border-radius: 4px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.12s;
  }
  .marker:hover .tip { opacity: 1; }

  /* ---- Pop-up ---- */
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.55);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  #overlay.open { display: flex; }
  #popup {
    position: relative;
    background: var(--popup-bg);
    color: var(--popup-text);
    border: 3px solid var(--popup-border);
    border-radius: 8px;
    max-width: 460px;
    width: calc(100% - 48px);
    max-height: 80vh;
    overflow-y: auto;
    padding: 24px 28px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
  }
  #popup h2 {
    margin: 0 0 12px;
    font-size: 24px;
    border-bottom: 2px solid rgba(61, 32, 8, 0.3);
    padding-bottom: 8px;
  }
  #popup .body { font-size: 16px; line-height: 1.6; }
  #popup .body:empty::before {
    content: "(Aucun texte pour ce lieu pour le moment.)";
    color: #8a7a5c;
    font-style: italic;
  }
  #popup .close {
    position: absolute;
    top: 10px;
    right: 14px;
    background: none;
    border: none;
    font-size: 26px;
    line-height: 1;
    cursor: pointer;
    color: var(--popup-border);
  }
  #popup .close:hover { color: #7a3a1a; }
</style>
</head>
<body>

<div id="map-wrap">
  <img id="map-img" src="Drustvarsanspoint.png" alt="Carte de Drustvar">
  <div id="markers"></div>
</div>

<!-- Pop-up -->
<div id="overlay">
  <div id="popup">
    <button class="close" aria-label="Fermer" onclick="closePopup()">&times;</button>
    <h2 id="popup-title"></h2>
    <div class="body" id="popup-body"></div>
  </div>
</div>

<script>
  /* ============================================================
     LIEUX DE LA CARTE
     Pour écrire un pop-up, remplis le champ "text" du lieu voulu.
     HTML simple autorisé : <b>gras</b>, <i>italique</i>, <br> saut de ligne.
     Ne touche pas à x, y et type (position et forme du marqueur).
     ============================================================ */
  const LOCATIONS = [
    { id:  1, name: "Port-Banal", x: 19.873, y: 43.88, type: "small", text: "" },
    { id:  2, name: "Crêt-Rouge", x: 18.213, y: 60.124, type: "big", text: "" },
    { id:  3, name: "Butte-du-Faucon", x: 26.074, y: 71.257, type: "big", text: "" },
    { id:  4, name: "Noirétang", x: 32.324, y: 63.184, type: "big", text: "" },
    { id:  5, name: "Froidecombe", x: 39.014, y: 33.333, type: "big", text: "" },
    { id:  6, name: "Ferté-d'Arom", x: 39.746, y: 48.255, type: "square", text: "" },
    { id:  7, name: "Front-de-Glace", x: 50.586, y: 41.172, type: "big", text: "" },
    { id:  8, name: "Cornemont", x: 48.096, y: 27.773, type: "big", text: "" },
    { id:  9, name: "Hauts de Corlain", x: 33.496, y: 15.755, type: "square", text: "" },
    { id: 10, name: "Corlain", x: 29.785, y: 25.482, type: "big", text: "" },
    { id: 11, name: "Tour Crefort", x: 37.5, y: 54.349, type: "small", text: "" },
    { id: 12, name: "Rucherain", x: 44.922, y: 55, type: "big", text: "" },
    { id: 13, name: "Griseroche", x: 38.721, y: 62.292, type: "big", text: "" },
    { id: 14, name: "Tertrebois", x: 62.451, y: 53.411, type: "big", text: "" },
    { id: 15, name: "Cimetière de Tertrebois", x: 64.453, y: 47.617, type: "small", text: "" },
    { id: 16, name: "Ruisseval", x: 60.352, y: 38.307, type: "big", text: "" },
    { id: 17, name: "Havrebrune", x: 62.549, y: 33.477, type: "big", text: "" },
    { id: 18, name: "Port du Désosseur", x: 69.678, y: 28.789, type: "big", text: "" },
    { id: 19, name: "Manoir Valautomne", x: 60.498, y: 21.406, type: "small", text: "" },
    { id: 20, name: "Quai du Trident", x: 57.959, y: 7.487, type: "big", text: "" },
    { id: 21, name: "Quai du Trident", x: 60.889, y: 3.32, type: "big", text: "" },
    { id: 22, name: "Corvenac", x: 61.865, y: 78.177, type: "big", text: "" },
    { id: 23, name: "Capembrun", x: 21.582, y: 25.911, type: "big", text: "" },
    { id: 24, name: "Chapelle des Bois-Blancs", x: 23.291, y: 13.216, type: "small", text: "" },
    { id: 25, name: "Brisecôte", x: 19.336, y: 32.292, type: "big", text: "" },
    { id: 26, name: "Bruménac", x: 71.143, y: 72.493, type: "big", text: "" },
    { id: 27, name: "Val-Archer", x: 77.1, y: 63.118, type: "big", text: "" },
    { id: 28, name: "Pavillon des Éperlans", x: 77.393, y: 49.935, type: "small", text: "" },
    { id: 29, name: "Pointe du Gibet", x: 78.662, y: 39.193, type: "small", text: "" },
    { id: 30, name: "Tour de Guet", x: 83.378, y: 46.441, type: "small", text: "" },
    { id: 31, name: "Colline de la Vigie", x: 89.189, y: 51.552, type: "big", text: "" },
    { id: 32, name: "Harasac", x: 26.025, y: 43.555, type: "big", text: "" },
    { id: 33, name: "Mines des Collines Désolées", x: 35.986, y: 29.297, type: "small", text: "" },
    { id: 34, name: "Armurerie de Corlain", x: 23.486, y: 35.091, type: "small", text: "" },
    { id: 35, name: "Domaine Lovell", x: 76.758, y: 2.409, type: "big", text: "" },
    { id: 36, name: "Domaine Norwington", x: 82.06, y: 9.896, type: "small", text: "" },
    { id: 37, name: "Manoir Malvoie", x: 34.696, y: 9.049, type: "small", text: "" },
    { id: 38, name: "Quai d'Accastillage", x: 29.688, y: 11.784, type: "big", text: "" },
    { id: 39, name: "Porte de Daelin", x: 88.774, y: 62.527, type: "small", text: "" },
    { id: 40, name: "Guet de l'Ouest", x: 15.129, y: 6.836, type: "small", text: "" },
  ];

  /* ============================================================
     MOTEUR DE LA CARTE — pas besoin d'y toucher
     ============================================================ */
  const ORIG_WIDTH = 2048; // largeur native de la carte
  const wrap = document.getElementById('map-wrap');
  const img = document.getElementById('map-img');
  const markersLayer = document.getElementById('markers');

  function shapeHTML(type) {
    if (type === 'small')  return '<span class="shape-small"></span>';
    if (type === 'big')    return '<span class="shape-big"></span>';
    if (type === 'square') return '<span class="shape-square"></span>';
    return '<span class="shape-small"></span>';
  }

  function buildMarkers() {
    markersLayer.innerHTML = '';
    LOCATIONS.forEach(loc => {
      const m = document.createElement('div');
      m.className = 'marker';
      m.style.left = loc.x + '%';
      m.style.top = loc.y + '%';
      const tip = loc.name ? `<span class="tip">${loc.name}</span>` : '';
      m.innerHTML = shapeHTML(loc.type) + tip;
      m.addEventListener('click', () => openPopup(loc));
      markersLayer.appendChild(m);
    });
  }

  function updateScale() {
    const displayed = img.getBoundingClientRect().width;
    if (displayed > 0) {
      wrap.style.setProperty('--u', (displayed / ORIG_WIDTH) + 'px');
    }
  }

  const overlay = document.getElementById('overlay');
  function openPopup(loc) {
    document.getElementById('popup-title').textContent = loc.name || ('Lieu n°' + loc.id);
    document.getElementById('popup-body').innerHTML = loc.text || '';
    overlay.classList.add('open');
  }
  function closePopup() {
    overlay.classList.remove('open');
  }
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closePopup(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closePopup(); });

  window.addEventListener('resize', updateScale);
  img.addEventListener('load', updateScale);
  buildMarkers();
  if (img.complete) updateScale();
</script>
</body>
</html>
